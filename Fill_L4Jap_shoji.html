<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson 4 本文穴埋め練習</title>
    <style>
        :root {
            /* 全体を紫系統（ディープパープル／アメジスト）に統一 */
            --primary-color: #6a1b9a;    /* 落ち着いた深みのある紫 */
            --success-color: #8e24aa;    /* 正解時：明るめの紫 */
            --error-color: #d32f2f;      /* 不正解時：視認性の高い赤 */
            --bg-color: #f3e5f5;         /* 背景色：ごく薄い藤色・ラベンダー */
            --text-color: #2a1b3d;       /* 文字色：暗い濃紫 */
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(106, 27, 154, 0.15);
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 30px;
        }

        .screen {
            display: none;
        }

        .screen.active {
            display: block;
        }

        /* ログイン画面 */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        input[type="text"], select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e1bee7;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
            background-color: white;
        }
        
        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .btn-group {
            display: flex;
            gap: 20px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-primary { background-color: var(--primary-color); color: white; }
        .btn-success { background-color: var(--success-color); color: white; }
        .btn-secondary { background-color: #7b1fa2; color: white; }

        button:hover { opacity: 0.9; }

        /* メインゲーム画面 */
        .game-layout {
            display: flex;
            gap: 30px;
            margin-top: 20px;
        }

        .text-panel {
            flex: 2;
            max-height: 60vh;
            overflow-y: auto;
            padding: 20px;
            border: 2px solid #f3e5f5;
            border-radius: 8px;
            background: #fff;
            line-height: 2;
            font-size: 18px;
        }

        .word-panel {
            flex: 1;
            background: #f3e5f5;
            padding: 20px;
            border-radius: 8px;
            max-height: 60vh;
            overflow-y: auto;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-content: flex-start;
        }

        /* ドロップ先（空欄） */
        .blank {
            display: inline-block;
            min-width: 90px;
            height: 30px;
            border-bottom: 2px solid var(--primary-color);
            margin: 0 5px;
            vertical-align: middle;
            text-align: center;
            line-height: 30px;
            font-weight: bold;
            position: relative;
            color: transparent;
        }

        .blank.correct {
            color: var(--success-color);
            border-bottom-color: var(--success-color);
        }

        .blank.wrong {
            color: var(--error-color);
            border-bottom-color: var(--error-color);
            animation: shake 0.3s;
        }

        .blank.filled {
            color: var(--text-color);
        }

        /* ドラッグする単語カード */
        .word-card {
            background: white;
            padding: 6px 12px;
            border: 2px solid #e1bee7;
            border-radius: 4px;
            cursor: grab;
            user-select: none;
            font-weight: bold;
            color: var(--primary-color);
        }

        .word-card:active { cursor: grabbing; }
        .word-card.correct-used { background-color: #f3e5f5; color: #ba68c8; border-color: #e1bee7; cursor: not-allowed; opacity: 0.6; }
        .word-card.wrong-used { background-color: #f8d7da; color: #721c24; border-color: #f5c6cb; }

        /* フィードバックトースト */
        #feedback {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 1000;
        }
        .fb-right { background-color: var(--success-color); box-shadow: 0 4px 10px rgba(142,36,170,0.4); }
        .fb-boo { background-color: var(--error-color); box-shadow: 0 4px 10px rgba(231,29,54,0.4); }

        /* 結果画面 */
        .result-card {
            background: #f3e5f5;
            padding: 30px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .result-item {
            font-size: 20px;
            margin-bottom: 12px;
        }
        .score-huge {
            font-size: 64px;
            font-weight: bold;
            color: var(--success-color);
            text-align: center;
            margin: 20px 0;
        }
        .mistake-list-box {
            background: white;
            border: 1px solid #e1bee7;
            border-radius: 6px;
            padding: 15px;
            margin-top: 10px;
            max-height: 150px;
            overflow-y: auto;
        }
        .mistake-tag {
            display: inline-block;
            background: #f8d7da;
            color: #721c24;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            margin: 4px;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Lesson 4 本文穴埋め練習</h1>

    <div id="login-screen" class="screen active">
        <div class="form-group"><label>クラス</label><input type="text" id="input-class" placeholder="例: 7, 8, C2"></div>
        <div class="form-group"><label>番号</label><input type="text" id="input-number" placeholder="例: 13"></div>
        <div class="form-group"><label>氏名</label><input type="text" id="input-name" placeholder="例: 熊谷 誠人"></div>
        <div class="form-group">
            <label>パート選択</label>
            <select id="select-part">
                <option value="Part 1">Part 1</option>
                <option value="Part 2">Part 2</option>
                <option value="Part 3">Part 3</option>
            </select>
        </div>
        
        <div class="btn-group">
            <button class="btn-primary" onclick="startGame('1st Step')">1st Step (都度判定)</button> 
            <button class="btn-success" onclick="startGame('2nd Step')">2nd Step (一括判定)</button>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <h2 id="mode-display" style="text-align: center; color: #5c2575;"></h2>
        <div style="margin-bottom: 10px; font-weight: bold;" id="player-info-display"></div>
        <div class="game-layout">
            <div class="text-panel" id="text-panel"></div>
            <div class="word-panel" id="word-panel"></div>
        </div>
        <div class="btn-group">
            <button class="btn-secondary" onclick="backToMenu()">戻る</button>
        </div>
    </div>

    <div id="result-screen" class="screen">
        <h2>練習結果</h2>
        <div class="result-card"> 
            <div class="score-huge" id="res-score">🎉100%🎉</div>
            <div class="result-item"><strong>パート:</strong> <span id="res-part"></span></div>
            <div class="result-item"><strong>モード:</strong> <span id="res-mode"></span></div>
            <div class="result-item"><strong>クラス:</strong> <span id="res-class"></span></div>
            <div class="result-item"><strong>番号:</strong> <span id="res-number"></span></div>
            <div class="result-item"><strong>氏名:</strong> <span id="res-name"></span></div>
            <div class="result-item"><strong>完了日時:</strong> <span id="res-time"></span></div>
            <div class="result-item"><strong>間違えた回数:</strong> <span id="res-mistakes" style="color: var(--error-color); font-weight: bold;"></span> 回</div>
            <div class="result-item" id="mistake-list-container">
                <strong>間違えた単語のリスト:</strong>
                <div class="mistake-list-box" id="res-mistake-list"></div>
            </div>
        </div>
        <button class="btn-primary" style="width:100%" onclick="backToMenu()">もう一度解く / パート選択へ戻る</button>
    </div>
</div>

<div id="feedback"></div>

<script>

        },

            { type: 'text', content: '松本さんは，北米最高峰上空の' }, { type: 'blank', id: 9 }, { type: 'text', content: 'の写真を撮りたいと思いました。そのような写真は，星野道夫さんへの' }, { type: 'blank', id: 10 }, { type: 'text', content: 'なるだろうと思いました。その人は，1996年にロシアで' }, { type: 'blank', id: 11 }, { type: 'text', content: 'に襲われて死んだ有名な' }, { type: 'blank', id: 12 }, { type: 'text', content: 'でした。<br>' },
            { type: 'text', content: '松本さんがその写真を撮るのに' }, { type: 'blank', id: 13 }, { type: 'text', content: 'かかりました。彼はデナリ山のふもとで冬の' }, { type: 'blank', id: 14 }, { type: 'text', content: 'を３回行いました。彼はオーロラと山が同じ' }, { type: 'blank', id: 15 }, { type: 'text', content: 'に収まるのを待つことに，' }, { type: 'blank', id: 16 }, { type: 'text', content: 'で，64日間を費やしました。その両方を' }, { type: 'blank', id: 17 }, { type: 'text', content: 'にとらえるには，多少の' }, { type: 'blank', id: 18 }, { type: 'text', content: 'がなければなりませんでした。彼は，' }, { type: 'blank', id: 19 }, { type: 'text', content: 'なら最適な光を与えてくれるだろうと思いました。というのも，半月はオーロラを消さない程度に' }, { type: 'blank', id: 20 }, { type: 'text', content: 'のですが，山を照らすには十分' }, { type: 'blank', id: 21 }, { type: 'text', content: 'からでした。彼はついに2001年２月になんとかその' }, { type: 'blank', id: 22 }, { type: 'text', content: 'ことをやり遂げました。' }
        ]
    },
    "Part 2": {
        words: {
            1: "大学生", 2: "人生", 3: "アラスカ", 4: "本", 5: "クジラ", 
            6: "カリブー", 7: "星野道夫さん", 8: "刺激", 9: "自然写真家", 10: "美しいもの", 
            11: "芸術作品", 12: "日本の大学", 13: "アラスカ大学サウスイースト校", 14: "社会", 15: "先住民", 
            16: "側面"
        },
        structure: [
            { type: 'text', content: 'さかのぼって1994 年，松本さんは日本の' }, { type: 'blank', id: 1 }, { type: 'text', content: 'でした。当時，彼は自分の' }, { type: 'blank', id: 2 }, { type: 'text', content: 'で何をしたいのか全くわかりませんでした。ある日，彼は書店で『' }, { type: 'blank', id: 3 }, { type: 'text', content: '』という書名の' }, { type: 'blank', id: 4 }, { type: 'text', content: 'をふと見つけました。それには，南東アラスカの' }, { type: 'blank', id: 5 }, { type: 'text', content: 'と北極圏の' }, { type: 'blank', id: 6 }, { type: 'text', content: 'の写真が載っていました。著者は' }, { type: 'blank', id: 7 }, { type: 'text', content: 'でした。<br>' },
            { type: 'text', content: '松本さんは 星野さんの写真に' }, { type: 'blank', id: 8 }, { type: 'text', content: 'を受け，' }, { type: 'blank', id: 9 }, { type: 'text', content: 'になろうと決心しました。' }, { type: 'blank', id: 10 }, { type: 'text', content: 'を追求して，それを自分の' }, { type: 'blank', id: 11 }, { type: 'text', content: 'に変えることができると思いました。松本さんは' }, { type: 'blank', id: 12 }, { type: 'text', content: 'を辞め，' }, { type: 'blank', id: 13 }, { type: 'text', content: 'に入学しました。彼は歴史，' }, { type: 'blank', id: 14 }, { type: 'text', content: '問題，' }, { type: 'blank', id: 15 }, { type: 'text', content: 'を含め，アラスカのさまざまな多くの' }, { type: 'blank', id: 16 }, { type: 'text', content: 'を研究しました。' }
        ]
    },
    "Part 3": {
        words: {
            1: "クジラ", 2: "無人島", 3: "氷河", 4: "20年以上", 5: "ホテル", 
            6: "オーロラ", 7: "気温", 8: "冬", 9: "過程", 10: "後悔", 
            11: "人生"
        },
        structure: [
            { type: 'text', content: '現在，夏に松本さんは，' }, { type: 'blank', id: 1 }, { type: 'text', content: 'の写真を撮るため，南東アラスカの' }, { type: 'blank', id: 2 }, { type: 'text', content: 'で２か月間キャンプをして過ごします。冬には，オーロラの写真を撮るために' }, { type: 'blank', id: 3 }, { type: 'text', content: 'の上で２か月間キャンプをして過ごします。彼はこれを' }, { type: 'blank', id: 4 }, { type: 'text', content: '続けています。<br>' },
            { type: 'text', content: '松本さんは「春か秋に' }, { type: 'blank', id: 5 }, { type: 'text', content: 'に滞在しながら' }, { type: 'blank', id: 6 }, { type: 'text', content: 'の写真を撮ることはできます。しかし，私は' }, { type: 'blank', id: 7 }, { type: 'text', content: 'が摂氏マイナス 40 度まで下がる場所で' }, { type: 'blank', id: 8 }, { type: 'text', content: 'の２か月間を過ごします。これは，' }, { type: 'blank', id: 9 }, { type: 'text', content: 'が大事だからです。私は自分の写真撮影に関して' }, { type: 'blank', id: 10 }, { type: 'text', content: 'したくありません。自分の' }, { type: 'blank', id: 11 }, { type: 'text', content: 'も後悔したくないのです。」と言っています。' }
        ]
    }
};

let currentPart = 'Part 1';
let currentMode = '';
let mistakeCount = 0;
let userAnswers = {};
let mistakenWordsSet = new Set();
let audioCtx = null;

function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playSound(type) {
    initAudio();
    if (!audioCtx) return;
    if (type === 'right') {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(660, audioCtx.currentTime);
        osc.frequency.setValueAtTime(880, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
        osc.start(); osc.stop(audioCtx.currentTime + 0.4);
    }
    else if (type === 'tada') {
        const now = audioCtx.currentTime;
        playTone(523.25, now, 0.15);
        playTone(659.25, now, 0.15);
        playTone(783.99, now, 0.15);
        
        playTone(523.25, now + 0.18, 0.6);
        playTone(659.25, now + 0.18, 0.6);
        playTone(783.99, now + 0.18, 0.6);
        playTone(1046.50, now + 0.18, 0.6);
    }
    else {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(150, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.5);
    }
}

function playTone(freq, startTime, duration) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(freq, startTime);
    gain.gain.setValueAtTime(0.2, startTime);
    gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(startTime);
    osc.stop(startTime + duration);
}

function showScreen(screenId) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(screenId).classList.add('active');
}

function startGame(mode) {
    currentMode = mode;
    currentPart = document.getElementById('select-part').value;
    mistakeCount = 0;
    userAnswers = {};
    mistakenWordsSet.clear();
    
    const clazz = document.getElementById('input-class').value || '未入力';
    const num = document.getElementById('input-number').value || '未入力';
    const name = document.getElementById('input-name').value || '未入力';
    
    document.getElementById('mode-display').innerText = `${currentPart} - ${currentMode}`;
    document.getElementById('player-info-display').innerText = `参加者: ${clazz}組 ${num}番 ${name}`;
    
    buildGameBoard();
    showScreen('game-screen');
}

function backToMenu() {
    showScreen('login-screen');
}

function showToast(message, isRight) {
    const fb = document.getElementById('feedback');
    fb.innerText = message;
    fb.className = isRight ? 'fb-right' : 'fb-boo';
    fb.style.opacity = '1';
    setTimeout(() => { fb.style.opacity = '0'; }, 800);
}

function buildGameBoard() {
    const textPanel = document.getElementById('text-panel');
    const wordPanel = document.getElementById('word-panel');
    textPanel.innerHTML = '';
    wordPanel.innerHTML = '';
    
    const activeData = partData[currentPart];

    activeData.structure.forEach(item => {
        if (item.type === 'text') {
            const span = document.createElement('span');
            span.innerHTML = item.content;
            textPanel.appendChild(span);
        } else if (item.type === 'blank') {
            const blank = document.createElement('div');
            blank.className = 'blank';
            blank.id = `blank-${item.id}`;
            blank.dataset.id = item.id;
            
            blank.ondragover = (e) => e.preventDefault();
            blank.ondrop = (e) => handleDrop(e, item.id);
            
            textPanel.appendChild(blank);
        }
    });

    const shuffledWords = Object.values(activeData.words).sort(() => Math.random() - 0.5);
    shuffledWords.forEach((word, index) => {
        const card = document.createElement('div');
        card.className = 'word-card';
        card.innerText = word;
        card.draggable = true;
        card.id = `word-card-${index}`;
        card.ondragstart = (e) => {
            e.dataTransfer.setData('text/plain', JSON.stringify({word: word, cardId: card.id}));
        };
        wordPanel.appendChild(card);
    });
}

function handleDrop(e, blankId) {
    e.preventDefault();
    const data = JSON.parse(e.dataTransfer.getData('text/plain'));
    const draggedWord = data.word;
    const cardId = data.cardId;
    const blankEl = document.getElementById(`blank-${blankId}`);
    const cardEl = document.getElementById(cardId);
    
    const activeData = partData[currentPart];
    const totalBlanksCount = Object.keys(activeData.words).length;

    if (currentMode === '1st Step') {
        if (blankEl.classList.contains('correct')) return;
        if (activeData.words[blankId] === draggedWord) {
            playSound('right');
            showToast('right!', true);
            blankEl.innerText = draggedWord;
            blankEl.className = 'blank correct';
            cardEl.className = 'word-card correct-used';
            cardEl.draggable = false;
            userAnswers[blankId] = draggedWord;
            checkGameCompletion(totalBlanksCount);
        } else {
            playSound('wrong');
            showToast('boo!', false);
            mistakeCount++;
            mistakenWordsSet.add(activeData.words[blankId]);
            
            cardEl.classList.add('wrong-used');
            blankEl.classList.add('wrong');
            setTimeout(() => { blankEl.classList.remove('wrong'); }, 500);
        }
    } else if (currentMode === '2nd Step') {
        blankEl.innerText = draggedWord;
        blankEl.className = 'blank filled';
        userAnswers[blankId] = draggedWord;
        cardEl.className = 'word-card correct-used';

        if (Object.keys(userAnswers).length === totalBlanksCount) {
            setTimeout(() => evaluateSecondStep(totalBlanksCount), 1000);
        }
    }
}

function evaluateSecondStep(totalBlanksCount) {
    let allCorrect = true;
    const activeData = partData[currentPart];

    for (let id = 1; id <= totalBlanksCount; id++) {
        const blankEl = document.getElementById(`blank-${id}`);
        const userAns = userAnswers[id];
        
        if (activeData.words[id] === userAns) {
            blankEl.className = 'blank correct';
        } else {
            blankEl.className = 'blank wrong';
            allCorrect = false;
            mistakeCount++;
            mistakenWordsSet.add(activeData.words[id]);
            const cards = document.querySelectorAll('.word-card');
            cards.forEach(card => {
                if (card.innerText === userAns) {
                    card.className = 'word-card';
                    card.draggable = true;
                }
            });
            blankEl.innerText = '';
            delete userAnswers[id];
        }
    }

    if (allCorrect) {
        playSound('tada');
        showGameResult();
    } else {
        playSound('wrong');
    }
}

function checkGameCompletion(totalBlanksCount) {
    if (Object.keys(userAnswers).length === totalBlanksCount) {
        setTimeout(() => {
            playSound('tada');
            showGameResult();
        }, 500);
    }
}

function showGameResult() {
    const now = new Date();
    const timeStr = `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;

    document.getElementById('res-part').innerText = currentPart;
    document.getElementById('res-mode').innerText = currentMode;
    document.getElementById('res-class').innerText = document.getElementById('input-class').value || '未入力';
    document.getElementById('res-number').innerText = document.getElementById('input-number').value || '未入力';
    document.getElementById('res-name').innerText = document.getElementById('input-name').value || '未入力';
    document.getElementById('res-time').innerText = timeStr;
    document.getElementById('res-mistakes').innerText = mistakeCount;

    const listContainer = document.getElementById('res-mistake-list');
    listContainer.innerHTML = '';
    if (mistakenWordsSet.size > 0) {
        document.getElementById('mistake-list-container').style.display = 'block';
        mistakenWordsSet.forEach(word => {
            const tag = document.createElement('span');
            tag.className = 'mistake-tag';
            tag.innerText = word;
            listContainer.appendChild(tag);
        });
    } else {
        listContainer.innerHTML = '<span style="color: #8e24aa; font-weight: bold;">なし！素晴らしいパフォーマンスです！</span>';
    }

    showScreen('result-screen');
}
</script>

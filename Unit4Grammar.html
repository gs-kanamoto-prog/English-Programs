<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>動詞の時制問題</title>
    <style>
        :root {
            /* 紫ベースのカラーパレット */
            --primary-color: #6b46c1;    /* 深みのあるパープル */
            --primary-light: #9f7aea;    /* 明るめのパープル */
            --primary-bg: #faf5ff;       /* 薄い紫の背景 */
            --success-color: #2ec4b6;
            --error-color: #e71d36;      /* 強調・エラー用の赤 */
            --bg-color: #f3f0f7;         /* 全体の背景（ほんのり紫） */
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(107, 70, 193, 0.15);
            padding: 30px;
            width: 100%;
            max-width: 600px;
            box-sizing: border-box;
            text-align: center;
            position: relative;
            border-top: 6px solid var(--primary-color);
        }
        h1 {
            color: #2d3748;
            margin-bottom: 5px;
            font-size: 24px;
        }
        .subtitle {
            color: #718096;
            margin-bottom: 25px;
            font-size: 14px;
        }
        .hidden {
            display: none !important;
        }
        /* 入力画面スタイル */
        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }
        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #4a5568;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            transition: all 0.3s;
        }
        input[type="text"]:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(107, 70, 193, 0.2);
            outline: none;
        }
        .action-btn {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-light));
            color: white;
            border: none;
            padding: 14px 24px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: opacity 0.2s;
            width: 100%;
            margin-top: 15px;
            font-weight: bold;
            box-shadow: 0 4px 12px rgba(107, 70, 193, 0.3);
        }
        .action-btn:hover {
            opacity: 0.9;
        }
        
        /* タイマーと進行状況のヘッダー */
        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .progress {
            font-size: 14px;
            color: #718096;
            font-weight: bold;
        }
        .timer-box {
            font-size: 16px;
            font-weight: bold;
            color: var(--primary-color);
            background-color: var(--primary-bg);
            padding: 6px 14px;
            border-radius: 20px;
            min-width: 80px;
            border: 1px solid #e9d8fd;
        }
        .timer-warn {
            color: var(--error-color);
            background-color: #ffebeb;
            border-color: #fed7d7;
            animation: blink 0.5s infinite alternate;
        }
        @keyframes blink {
            from { opacity: 1; }
            to { opacity: 0.5; }
        }

        .question-text {
            font-size: 20px;
            font-weight: bold;
            color: #2d3748;
            margin: 25px 0;
            line-height: 1.6;
            min-height: 50px;
        }

        /* ヒント連動の赤字スタイル */
        .hint-target {
            color: inherit; /* 最初は親要素の色（黒）を引き継ぐ */
            transition: color 0.3s ease;
        }
        .hint-target.is-active {
            color: var(--error-color); /* ヒント開放時に赤くなる */
        }

        /* ヒント関連 */
        .hint-container {
            margin-bottom: 20px;
        }
        .hint-toggle-btn {
            background-color: #f7fafc;
            color: var(--primary-color);
            border: 1px solid #e2e8f0;
            padding: 8px 16px;
            font-size: 13px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        .hint-toggle-btn:hover {
            background-color: var(--primary-bg);
            border-color: #d6bcfa;
        }
        .hint-box {
            background-color: var(--primary-bg);
            border: 1px dashed #b7791f; /* 少し目立たせるためのゴールド系、または紫 */
            border-color: var(--primary-light);
            padding: 12px;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 14px;
            color: #4a5568;
            line-height: 1.5;
        }

        /* 2x2グリッド */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        .option-btn {
            background-color: #fff;
            border: 2px solid #e2e8f0;
            color: #4a5568;
            padding: 20px 10px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
        }
        .option-btn:hover:not(:disabled) {
            background-color: var(--primary-bg);
            border-color: var(--primary-light);
            color: var(--primary-color);
        }
        .option-btn:disabled {
            cursor: not-allowed;
        }
        
        /* フィードバック表示 */
        .feedback {
            font-size: 28px;
            font-weight: bold;
            margin: 15px 0;
            height: 40px;
        }
        .feedback.right { color: var(--success-color); }
        .feedback.boo { color: var(--error-color); }
        
        /* 結果表示 */
        .result-score {
            font-size: 48px;
            font-weight: bold;
            color: var(--primary-color);
            margin: 20px 0;
        }
        .result-info {
            background-color: var(--primary-bg);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 25px;
            text-align: left;
            font-size: 16px;
            line-height: 1.8;
            border-left: 5px solid var(--primary-color);
        }
        .fanfare-bg {
            background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%);
            border-left-color: #f59e0b;
        }
        .perfect-text {
            color: #d97706;
            font-size: 32px;
            animation: bounce 0.5s infinite alternate;
        }
        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-5px); }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>動詞の時制問題</h1>
    
    <div id="login-screen">
        <div class="subtitle">クラス、番号、氏名を入力してスタートしてください。</div>
        <div class="input-group">
            <label for="user-class">クラス</label>
            <input type="text" id="user-class" placeholder="例: 8, C2" required>
        </div>
        <div class="input-group">
            <label for="user-number">番号</label>
            <input type="text" id="user-number" placeholder="例: 13, D2" required>
        </div>
        <div class="input-group">
            <label for="user-name">氏名</label>
            <input type="text" id="user-name" placeholder="例: 寺部 だい" required>
        </div>
        <button class="action-btn" onclick="startQuiz()">クイズを開始する</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <div class="quiz-header">
            <div class="progress" id="progress-text">Question 1 / 15</div>
            <div class="timer-box" id="timer-display">残り 15秒</div>
        </div>
        
        <div class="question-text" id="question-box"></div>
        
        <div class="hint-container">
            <button class="hint-toggle-btn" onclick="toggleHint()">💡 ヒント（和訳）を見る</button>
            <div id="hint-box" class="hint-box hidden"></div>
        </div>
        
        <div class="options-grid">
            <button class="option-btn" onclick="checkAnswer(this)" id="opt0"></button>
            <button class="option-btn" onclick="checkAnswer(this)" id="opt1"></button>
            <button class="option-btn" onclick="checkAnswer(this)" id="opt2"></button>
            <button class="option-btn" onclick="checkAnswer(this)" id="opt3"></button>
        </div>
        <div id="feedback-box" class="feedback"></div>
    </div>

    <div id="result-screen" class="hidden">
        <div id="result-title" class="result-score"></div>
        <div id="result-details" class="result-info"></div>
        <button class="action-btn" onclick="restartQuiz()">もう一度挑戦する</button>
    </div>
</div>

<script>
const masterQuestions = [
    { q: "My father (        ) to work by train <hint>every morning</hint>.", ans: "goes", options: ["go", "goes", "is going", "went"], hint: "私の父は<hint>毎朝</hint>、電車で仕事に行きます。" },
    { q: "Water (        ) <hint>at 100 degrees Celsius</hint>.", ans: "boils", options: ["boil", "boils", "is boiling", "boiled"], hint: "水は<hint>摂氏100度で</hint>沸騰します。" },
    { q: "I <hint>usually</hint> (        ) breakfast at 7 o'clock.", ans: "eat", options: ["eat", "eats", "am eating", "ate"], hint: "私は<hint>たいてい</hint>7時に朝食を食べます。" },
    { q: "We (        ) a great movie <hint>last night</hint>.", ans: "watched", options: ["watch", "watched", "were watching", "will watch"], hint: "私たちは<hint>昨夜</hint>、素晴らしい映画を見ました。" },
    { q: "Alex (        ) to London <hint>three years ago</hint>.", ans: "moved", options: ["moves", "moved", "was moving", "has moved"], hint: "アレックスは<hint>3年前に</hint>ロンドンへ引っ越しました。" },
    { q: "<hint>When I was a child</hint>, I (        ) the piano.", ans: "played", options: ["play", "played", "am playing", "will play"], hint: "<hint>私が子供の頃</hint>、ピアノを弾いていました。" },
    { q: "Look! It (        ) outside <hint>right now</hint>.", ans: "is snowing", options: ["snows", "is snowing", "was snowing", "will snow"], hint: "見て！<hint>ちょうど今</hint>、外で雪が降っているよ。" },
    { q: "<hint>Listen!</hint> Someone (        ) the piano upstairs.", ans: "is playing", options: ["plays", "is playing", "are playing", "was playing"], hint: "<hint>聴いて！</hint>誰かが上の階でピアノを弾いているよ。" },
    { q: "They (        ) for the exam at the library <hint>at the moment</hint>.", ans: "are studying", options: ["study", "is studying", "are studying", "were studying"], hint: "彼らは<hint>今</hint>、図書館で試験勉強をしています。" },
    { q: "<hint>When you called me</hint>, I (        ) dinner.", ans: "was cooking", options: ["cooked", "am cooking", "was cooking", "were cooking"], hint: "<hint>あなたが私に電話をくれた時</hint>、私は夕食を作っているところでした。" },
    { q: "<hint>At 9 o'clock yesterday</hint> morning, they (        ) tennis.", ans: "were playing", options: ["played", "was playing", "were playing", "are playing"], hint: "<hint>昨日の午前9時</hint>、彼らはテニスをしていました。" },
    { q: "I (        ) TV <hint>when the electricity went out</hint>.", ans: "was watching", options: ["watched", "was watching", "am watching", "will be watching"], hint: "<hint>停電した時</hint>、私はテレビを見ているところでした。" },
    { q: "We (        ) a party <hint>tomorrow evening</hint>.", ans: "will have", options: ["have", "had", "will have", "has"], hint: "私たちは<hint>明日の晩</hint>、パーティーを開く予定です。" },
    { q: "I think it (        ) rainy <hint>next Sunday</hint>.", ans: "will be", options: ["is", "will", "will be", "was"], hint: "<hint>次の日曜日は</hint>雨が降ると思います。" },
    { q: "I (        ) you with your homework <hint>later</hint>.", ans: "will help", options: ["help", "helped", "am helping", "will help"], hint: "<hint>あとで</hint>宿題を手伝ってあげるよ。" }
];

let questions = [];
let currentQuestionIndex = 0;
let correctCount = 0;
let isAnswering = false;
let timeLeft = 15;
let timerInterval = null;

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(type) {
    if (audioCtx.state === 'suspended') {
        audioCtx.resume();
    }
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    const now = audioCtx.currentTime;

    if (type === 'right') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(523.25, now);
        osc.frequency.setValueAtTime(659.25, now + 0.1);
        gain.gain.setValueAtTime(0.3, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
        osc.start(now);
        osc.stop(now + 0.3);
    } else if (type === 'boo') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(120, now);
        osc.frequency.linearRampToValueAtTime(100, now + 0.4);
        gain.gain.setValueAtTime(0.3, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
        osc.start(now);
        osc.stop(now + 0.4);
    } else if (type === 'fanfare') {
        const notes = [261.63, 329.63, 392.00, 523.25];
        notes.forEach((freq, index) => {
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.connect(g);
            g.connect(audioCtx.destination);
            o.type = 'triangle';
            o.frequency.setValueAtTime(freq, now + index * 0.1);
            g.gain.setValueAtTime(0.2, now + index * 0.1);
            g.gain.exponentialRampToValueAtTime(0.01, now + index * 0.1 + 0.4);
            o.start(now + index * 0.1);
            o.stop(now + index * 0.1 + 0.4);
        });
    }
}

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

function startQuiz() {
    const cls = document.getElementById('user-class').value.trim();
    const num = document.getElementById('user-number').value.trim();
    const name = document.getElementById('user-name').value.trim();

    if (!cls || !num || !name) {
        alert('クラス、番号、氏名をすべて入力してください。');
        return;
    }

    questions = shuffle([...masterQuestions]);
    currentQuestionIndex = 0;
    correctCount = 0;

    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('quiz-screen').classList.remove('hidden');
    document.getElementById('result-screen').classList.add('hidden');

    showQuestion();
}

function showQuestion() {
    isAnswering = false;
    
    const hintBox = document.getElementById('hint-box');
    hintBox.classList.add('hidden');
    const feedbackBox = document.getElementById('feedback-box');
    feedbackBox.textContent = '';
    feedbackBox.className = 'feedback';

    document.getElementById('progress-text').textContent = `Question ${currentQuestionIndex + 1} / ${questions.length}`;
    
    const currentQ = questions[currentQuestionIndex];

    // ★変更箇所: データ内の <hint>~</hint> を、クラス名を持ったspanタグに置換する
    const highlightBracket = (text) => {
        return text.replace(/<hint>(.*?)<\/hint>/g, '<span class="hint-target">$1</span>');
    };

    document.getElementById('question-box').innerHTML = highlightBracket(currentQ.q);
    hintBox.innerHTML = highlightBracket(currentQ.hint);

    const shuffledOptions = shuffle([...currentQ.options]);

    for (let i = 0; i < 4; i++) {
        const btn = document.getElementById(`opt${i}`);
        btn.textContent = shuffledOptions[i];
        btn.style.backgroundColor = '';
        btn.style.borderColor = '';
        btn.disabled = false;
    }

    resetAndStartTimer();
}

function resetAndStartTimer() {
    clearInterval(timerInterval);
    timeLeft = 15;
    const timerDisplay = document.getElementById('timer-display');
    timerDisplay.textContent = `残り ${timeLeft}秒`;
    timerDisplay.className = "timer-box";

    timerInterval = setInterval(() => {
        timeLeft--;
        timerDisplay.textContent = `残り ${timeLeft}秒`;

        if (timeLeft <= 5) {
            timerDisplay.classList.add('timer-warn');
        }

        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            timeOutAction();
        }
    }, 1000);
}

function toggleHint() {
    const hintBox = document.getElementById('hint-box');
    hintBox.classList.toggle('hidden');

    // クイズ画面内のすべての「hint-target」を取得
    const targets = document.querySelectorAll('.hint-target');
    
    // ヒントボックスが表示されている時は赤字クラス（is-active）を付与、隠れたら削除
    if (!hintBox.classList.contains('hidden')) {
        targets.forEach(el => el.classList.add('is-active'));
    } else {
        targets.forEach(el => el.classList.remove('is-active'));
    }
}

function checkAnswer(clickedButton) {
    if (isAnswering) return;
    isAnswering = true;
    clearInterval(timerInterval);

    const currentQ = questions[currentQuestionIndex];
    const feedbackBox = document.getElementById('feedback-box');
    const selectedText = clickedButton.textContent;

    disableAllOptions();

    if (selectedText === currentQ.ans) {
        correctCount++;
        feedbackBox.textContent = "right!";
        feedbackBox.className = "feedback right";
        clickedButton.style.backgroundColor = "#c6f6d5";
        clickedButton.style.borderColor = "var(--success-color)";
        playSound('right');
    } else {
        feedbackBox.textContent = "Boo!";
        feedbackBox.className = "feedback boo";
        clickedButton.style.backgroundColor = "#fed7d7";
        clickedButton.style.borderColor = "var(--error-color)";
        highlightCorrectAnswer();
        playSound('boo');
    }

    goToNextQuestion();
}

function timeOutAction() {
    isAnswering = true;
    disableAllOptions();

    const feedbackBox = document.getElementById('feedback-box');
    feedbackBox.textContent = "Boo! (Time Out)";
    feedbackBox.className = "feedback boo";
    
    highlightCorrectAnswer();
    playSound('boo');

    goToNextQuestion();
}

function highlightCorrectAnswer() {
    const currentQ = questions[currentQuestionIndex];
    for (let i = 0; i < 4; i++) {
        const btn = document.getElementById(`opt${i}`);
        if (btn.textContent === currentQ.ans) {
            btn.style.borderColor = "var(--success-color)";
            btn.style.backgroundColor = "#f0fff4";
        }
    }
}

function disableAllOptions() {
    for (let i = 0; i < 4; i++) {
        document.getElementById(`opt${i}`).disabled = true;
    }
}

function goToNextQuestion() {
    setTimeout(() => {
        currentQuestionIndex++;
        if (currentQuestionIndex < questions.length) {
            showQuestion();
        } else {
            showResult();
        }
    }, 1500);
}

function showResult() {
    clearInterval(timerInterval);
    document.getElementById('quiz-screen').classList.add('hidden');
    const resultScreen = document.getElementById('result-screen');
    resultScreen.classList.remove('hidden');

    const cls = document.getElementById('user-class').value;
    const num = document.getElementById('user-number').value;
    const name = document.getElementById('user-name').value;
    
    const accuracy = Math.round((correctCount / questions.length) * 100);
    
    const resultTitle = document.getElementById('result-title');
    const resultDetails = document.getElementById('result-details');

    const now = new Date();
    const formattedDate = `${now.getFullYear()}年${now.getMonth() + 1}月${now.getDate()}日 ${now.getHours()}時${now.getMinutes()}分`;

    if (accuracy === 100) {
        resultTitle.className = "result-score perfect-text";
        resultTitle.textContent = "🎉 100% 🎉";
        
        resultDetails.className = "result-info fanfare-bg";
        resultDetails.innerHTML = `
            <strong>【おめでとうございます！全問正解です】</strong><br>
            <strong>日時:</strong> ${formattedDate}<br>
            <strong>クラス:</strong> ${cls}<br>
            <strong>番号:</strong> ${num}<br>
            <strong>名前:</strong> ${name}
        `;
        playSound('fanfare');
    } else {
        resultTitle.className = "result-score";
        resultTitle.textContent = `正解率: ${accuracy}%`;
        
        resultDetails.className = "result-info";
        resultDetails.innerHTML = `
            <strong>クラス:</strong> ${cls}<br>
            <strong>番号:</strong> ${num}<br>
            <strong>名前:</strong> ${name}<br>
            <small style="color:#666;">（※制限時間内にたくさん正解して100%を目指そう！）</small>
        `;
    }
}

function restartQuiz() {
    startQuiz();
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="単語テスト">
<link rel="apple-touch-icon" href="icon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>単語練習アプリ</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
            /* 全体を優しいイエロー背景に */
            background-color: #fef7e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
        }
        .container {
            background-color: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(251, 188, 4, 0.15);
            text-align: center;
            width: 100%;
            max-width: 550px;
            box-sizing: border-box;
            border: 2px solid #fde293;
        }
        h1 { color: #443600; margin-top: 0; font-size: 24px; }
        h2 { color: #555; font-size: 16px; margin: 15px 0 5px 0; text-align: left; padding-left: 8%; }
        
        /* 画面の表示・非表示コントロール */
        .screen { display: none; }
        
        /* タイマー表示 */
        .timer-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .timer-bar {
            width: 70px;
            height: 8px; background-color: #e0e0e0;
            border-radius: 4px; overflow: hidden;
        }
        .timer-progress {
            width: 100%;
            height: 100%; background-color: #ea4335;
        }
        .timer-text { font-size: 13px; color: #666; margin-top: 2px; text-align: left; }

        /* 入力エリア（iPadのキーボード対策） */
        .form-group { margin-bottom: 12px; text-align: left; width: 85%; margin-left: auto; margin-right: auto; }
        .form-group label { font-size: 14px; color: #555; font-weight: bold; display: block; margin-bottom: 4px; }
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 12px; border: 2px solid #fde293; border-radius: 8px; font-size: 16px; box-sizing: border-box;
            -webkit-appearance: none;
            background-color: #fffde7;
        }
        input[type="text"]:focus, input[type="number"]:focus {
            outline: none;
            border-color: #fbbc04;
            background-color: #fff;
        }
        
        /* メインボタン（イエロー基調） */
        .primary-btn {
            background-color: #fbbc04;
            color: #333; border: none;
            padding: 14px 40px; font-size: 18px; font-weight: bold; border-radius: 8px;
            cursor: pointer; margin-top: 5px; width: 85%;
            -webkit-appearance: none;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: background 0.2s;
        }
        .primary-btn:active {
            background-color: #e3a800;
        }
        
        /* クイズエリア */
        .word-area {
            display: flex;
            justify-content: center; align-items: center; gap: 15px; margin: 20px 0;
        }
        .word { font-size: 38px; font-weight: bold; color: #e3a800; word-break: break-all; }
        
        .audio-btn {
            background-color: #fff8e1;
            border: 1px solid #fde293; font-size: 24px; cursor: pointer;
            border-radius: 50%; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;
        }

        /* 選択肢 2×2列（iPadのタッチ用に最適化） */
        .choices {
            display: grid;
            grid-template-columns: repeat(2, 1fr); gap: 14px; margin-top: 15px;
        }
        .choice-btn {
            background-color: #ffffff;
            border: 2px solid #fde293; border-radius: 12px;
            padding: 20px 10px; font-size: 18px; font-weight: bold; cursor: pointer; 
            text-align: center; min-height: 80px;
            box-sizing: border-box;
            display: flex; align-items: center; justify-content: center;
            -webkit-appearance: none; -webkit-tap-highlight-color: transparent;
            color: #443600;
        }
        
        /* 正解・不正解の装飾 */
        .choice-btn.correct-choice { background-color: #e6f4ea !important; border-color: #34a853 !important; color: #137333 !important; }
        .choice-btn.wrong-choice { background-color: #fce8e6 !important; border-color: #ea4335 !important; color: #c5221f !important; }

        .result-msg { font-size: 32px; font-weight: bold; margin: 15px 0; min-height: 40px; }
        .right { color: #34a853; }
        .wrong { color: #ea4335; }
        .info-msg { color: #666; font-size: 16px; margin: 15px 0; font-weight: bold; }
        
        /* 結果エリア */
        .score-display { font-size: 44px; font-weight: bold; color: #333; margin: 5px 0; }
        .fraction-display { font-size: 24px; color: #555; margin-bottom: 15px; font-weight: bold; }
        .perfect-record {
            background-color: #e6f4ea;
            border: 2px solid #34a853; color: #137333;
            padding: 15px; border-radius: 8px; text-align: left; margin-top: 15px; font-size: 15px;
        }
        .perfect-title { font-size: 28px; font-weight: bold; text-align: center; margin-bottom: 10px; color: #1b5e20; }
        .next-challenge-msg {
            background-color: #fff3cd;
            border: 1px solid #ffeeba; color: #856404;
            padding: 10px; margin-top: 10px; border-radius: 5px; font-weight: bold; text-align: center;
        }
        .limited-clear-msg {
            background-color: #e8f0fe;
            border: 1px solid #b4cffc; color: #1a73e8;
            padding: 12px; margin: 15px 0; border-radius: 8px; font-weight: bold; text-align: center; font-size: 18px;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="screen-login" class="screen" style="display: block;">
        <h1>📝 L.4 Pt.1 単語テスト</h1>
        <div class="form-group">
            <label>クラス</label>
            <input type="text" id="user-class" placeholder="例: 8">
        </div>
        <div class="form-group">
            <label>出席番号</label>
            <input type="number" id="user-number" placeholder="例: 13">
        </div>
        <div class="form-group">
            <label>名前</label>
            <input type="text" id="user-name" placeholder="例: 山田風太郎">
        </div>
        <button class="primary-btn" onclick="submitProfile()">さあ、始めよう</button>
    </div>

    <div id="screen-mode" class="screen">
        <h1>⚙️ モード選択</h1>
        <p style="color: #666; margin-bottom: 15px;">練習するモードを選んでください。</p>
        
        <h2>⏱️ 英 → 日 モード (時間制限あり)</h2>
        <button class="primary-btn" onclick="selectMode('en-ja', 'all')" style="background-color: #fbbc04;">"All-Out-Attack" mode</button>
        <button class="primary-btn" onclick="selectMode('en-ja', 'limited')" style="background-color: #fde293;">"Limited" mode</button>

        <h2>⏱️ 日 → 英 モード (時間制限あり)</h2>
        <button class="primary-btn" onclick="selectMode('ja-en', 'all')" style="background-color: #f4b400;">"All-Out-Attack" mode</button>
        <button class="primary-btn" onclick="selectMode('ja-en', 'limited')" style="background-color: #fce8e6; color: #c5221f; border: 1px solid #ea4335;">"Limited" mode</button>

        <h2>🐾 Step-by-Step mode (時間制限なし)</h2>
        <button class="primary-btn" onclick="selectMode('step-by-step', 'all')" style="background-color: #fff8e1; border: 2px solid #fbbc04; color: #e3a800;">”All-Out-Attack” mode</button>
        <button class="primary-btn" onclick="selectMode('step-by-step', 'limited')" style="background-color: #fafafa; border: 2px solid #ccc; color: #666;">"Limited" mode</button>
    </div>

    <div id="screen-quiz" class="screen">
        <div class="timer-container">
            <div id="quiz-timer-container">
                <div class="timer-bar"><div id="timer-progress" class="timer-progress"></div></div>
                <div class="timer-text"><span id="timer-sec">5.0</span>秒</div>
            </div>
            <div id="quiz-progress" style="color: #666; font-weight: bold;"></div>
        </div>
        <div class="word-area">
            <div class="word" id="question-word">English</div>
            <button class="audio-btn" onclick="speakCurrentWord()">🔊</button>
        </div>
        <div class="choices" id="choices-container"></div>
        <div class="result-msg" id="result-message"></div>
    </div>

    <div id="screen-result" class="screen">
        <h1>🏁 テスト終了</h1>
        <div class="score-display" id="score-text">0%</div>
        <div class="fraction-display" id="fraction-text" style="display: none;">0 / 0</div>
        
        <div id="limited-msg-area" class="limited-clear-msg" style="display: none;">
            👑 100%！All-Out-Attackモードに挑戦しよう！
        </div>

        <div id="step-msg-area" class="info-msg" style="display: none;">
            100%に向けて挑戦しよう！
        </div>

        <div id="perfect-area" style="display: none;">
            <div class="perfect-title">Lesson 4 Part.1 単語練習</div>
            <div class="perfect-record">
                <p><strong>モード:</strong> <span id="record-mode"></span></p>
                <p><strong>やった回数:</strong> <span id="record-count"></span> 回目</p>
                <p><strong>スコア:</strong> <span id="record-score"></span></p>
                <p><strong>達成時間:</strong> <span id="record-time"></span></p>
                <p><strong>クラス:</strong> <span id="record-class"></span></p>
                <p><strong>番号:</strong> <span id="record-number"></span>番</p>
                <p><strong>名前:</strong> <span id="record-name"></span></p>
            </div>
            <div id="challenge-msg" class="next-challenge-msg" style="display: none;">
                次は並べ替えに挑戦しよう
            </div>
        </div>
        
        <button class="primary-btn" id="restart-btn" onclick="restartQuiz()">再挑戦</button>
    </div>
</div>

<script>
    // ↓↓↓ 【先生用】ここにエクセルのデータを貼り付けてください ↓↓↓
    const defaultCSVData = `
effort,努力
without,～のない
result,結果
meaningless,意味がない
assembly,集会
disagree,反対する
say to myself,心の中で思う
process,過程
reaction,反応
comment,見解
opinion,意見
still,未だに
northern lights,オーロラ
over,～の上
peak,頂上
such a ,そのような～
tribute,尊敬のしるし
take,(時間)がかかる
trip,旅行
to the foot of,～のふもと
spend,過ごす
the same,同じ
capture,捉える
both,両方
provide,与える
weak,弱い
enough,十分な
light up,照らす
finally,ついに
manage to,なんとかしてやる
`;
    // ↑↑↑ データの最後の行までここに挟んでください ↑↑↑

    let userProfile = { class: '', number: '', name: '' };
    let originalList = [];
    let quizQueue = [];
    let allJapaneseAnswers = [];
    let allEnglishAnswers = []; 
    let quizMode = 'en-ja'; // 'en-ja', 'ja-en', 'step-by-step'
    let prevQuizMode = '';   // モード切り替えを検知するための変数
    let subMode = 'all';    // 'all', 'limited'
    let currentWordIndex = 0;
    let correctCount = 0;
    let attemptCount = 0;

    // Limitedモード：現在のモードにおける累積正解（一発正解）の英単語を記録するSet
    let globalCorrectWords = new Set();

    // Limitedモード：最低3回で全単語が出題されるための「まだ出題されていない単語」を管理するリスト
    let unaskedWordsPool = [];
    let timeLimit = 5000;
    let timeLeft = 5000;
    let timerInterval = null;
    let autoNextTimeout = null;
    let isAnswered = false;
    let isWrongWaiting = false;

    let isMaleVoice = true;
    let audioCtx = null;

    window.onload = function() {
        parseEmbeddedData(defaultCSVData);
        if ('speechSynthesis' in window) {
            window.speechSynthesis.getVoices();
        }
    };

    function parseEmbeddedData(text) {
        var lines = text.split(/\r?\n/);
        originalList = [];
        allJapaneseAnswers = [];
        allEnglishAnswers = [];

        for (var i = 0; i < lines.length; i++) {
            var parts = lines[i].split(',');
            if (parts.length >= 2 && parts[0].trim() !== "" && parts[1].trim() !== "") {
                var item = { en: parts[0].trim(), ja: parts[1].trim() };
                originalList.push(item);
                allJapaneseAnswers.push(parts[1].trim());
                allEnglishAnswers.push(parts[0].trim());
            }
        }
    }

    function showScreen(screenId) {
        document.getElementById('screen-login').style.display = 'none';
        document.getElementById('screen-mode').style.display = 'none';
        document.getElementById('screen-quiz').style.display = 'none';
        document.getElementById('screen-result').style.display = 'none';
        
        document.getElementById(screenId).style.display = 'block';
    }

    function submitProfile() {
        var uClass = document.getElementById('user-class').value.trim();
        var uNumber = document.getElementById('user-number').value.trim();
        var uName = document.getElementById('user-name').value.trim();

        if (!uClass || !uNumber || !uName) {
            alert("すべての項目を入力してください！");
            return;
        }

        userProfile = { class: uClass, number: uNumber, name: uName };
        showScreen('screen-mode');
    }

    function selectMode(mode, sub) {
        quizMode = mode;
        subMode = sub;

        // モードが変わった場合、正解の累積データと出題プールを完全にリセット
        if (quizMode !== prevQuizMode) {
            globalCorrectWords.clear();
            unaskedWordsPool = []; 
            prevQuizMode = quizMode; // 現在のモードを記憶
        }

        startQuizSession();
    }

    function startQuizSession() {
        attemptCount++;
        correctCount = 0;
        currentWordIndex = 0;

        // 全問題数をシャッフルしたベースリストを作成
        let shuffledOriginal = JSON.parse(JSON.stringify(originalList));
        shuffledOriginal.sort(function() { return Math.random() - 0.5; });

        if (subMode === 'limited') {
            // 今回出題する問題数（全問題数の半分、端数切り捨て、最低1問）
            let halfLength = Math.floor(originalList.length / 2);
            if (halfLength < 1) halfLength = 1;

            // 「未出題プール」が空、あるいは初期状態の場合は全単語をセット
            if (unaskedWordsPool.length === 0) {
                unaskedWordsPool = JSON.parse(JSON.stringify(originalList));
                unaskedWordsPool.sort(function() { return Math.random() - 0.5; });
            }

            let selectedList = [];
            // 1. まず未出題のプールから優先的に問題数を確保する
            while (selectedList.length < halfLength && unaskedWordsPool.length > 0) {
                selectedList.push(unaskedWordsPool.pop());
            }

            // 2. プールからだけでは問題数が足りない場合、全体のリストから重複しないように補填する
            if (selectedList.length < halfLength) {
                for (let i = 0; i < shuffledOriginal.length; i++) {
                    let candidate = shuffledOriginal[i];
                    // すでに選択されていないものを選ぶ
                    let isAlreadySelected = selectedList.some(item => item.en === candidate.en);
                    if (!isAlreadySelected) {
                        selectedList.push(candidate);
                    }
                    if (selectedList.length === halfLength) break;
                }
            }

            // 最後に今回のクイズキューをさらにランダムシャッフル
            selectedList.sort(function() { return Math.random() - 0.5; });
            quizQueue = selectedList;

        } else {
            // All-Out-Attack モードは全問出題
            quizQueue = shuffledOriginal;
        }

        showScreen('screen-quiz');
        nextQuestion();
    }

    function nextQuestion() {
        if (currentWordIndex >= quizQueue.length) {
            showResult();
            return;
        }

        document.getElementById('result-message').innerText = '';
        document.getElementById('result-message').className = 'result-msg';
        document.getElementById('quiz-progress').innerText = (currentWordIndex + 1) + " / " + quizQueue.length;
        isAnswered = false;
        isWrongWaiting = false;
        isMaleVoice = Math.random() < 0.5;
        var currentWord = quizQueue[currentWordIndex];
        
        if (quizMode === 'en-ja' || quizMode === 'step-by-step') {
            document.getElementById('question-word').innerText = currentWord.en;
            speakCurrentWord();
        } else {
            document.getElementById('question-word').innerText = currentWord.ja;
        }

        var correctAnswer = (quizMode === 'ja-en') ? currentWord.en : currentWord.ja;
        var dummyPool = (quizMode === 'ja-en') ? allEnglishAnswers : allJapaneseAnswers;

        var choices = [correctAnswer];
        while (choices.length < 4 && choices.length < dummyPool.length) {
            var randomDummy = dummyPool[Math.floor(Math.random() * dummyPool.length)];
            if (choices.indexOf(randomDummy) === -1) {
                choices.push(randomDummy);
            }
        }
        choices.sort(function() { return Math.random() - 0.5; });
        var container = document.getElementById('choices-container');
        container.innerHTML = '';
        
        for (var i = 0; i < choices.length; i++) {
            (function(choiceText) {
                var button = document.createElement('button');
                button.className = 'choice-btn';
                button.innerText = choiceText;
                button.onclick = function() { checkAnswer(choiceText, correctAnswer, button); };
                container.appendChild(button);
            })(choices[i]);
        }

        if (quizMode === 'step-by-step') {
            document.getElementById('quiz-timer-container').style.visibility = 'hidden';
            clearInterval(timerInterval);
        } else {
            document.getElementById('quiz-timer-container').style.visibility = 'visible';
            startTimer();
        }
    }

    function speakCurrentWord() {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            var currentWord = quizQueue[currentWordIndex];
            if (!currentWord) return;

            var utterance = new SpeechSynthesisUtterance(currentWord.en);
            utterance.lang = 'en-US';
            utterance.rate = 0.9;
            var voices = window.speechSynthesis.getVoices();
            var enVoices = voices.filter(function(v) { return v.lang.indexOf('en') === 0; });
            if (enVoices.length > 0) {
                var maleKeywords = ['male', 'david', 'mark', 'daniel', 'aaron', 'george', 'ravi'];
                var femaleKeywords = ['female', 'zira', 'samantha', 'karen', 'moira', 'hazel', 'susan', 'jessa'];
                var maleVoices = enVoices.filter(function(v) {
                    var name = v.name.toLowerCase();
                    return maleKeywords.some(function(k) { return name.indexOf(k) !== -1; });
                });
                var femaleVoices = enVoices.filter(function(v) {
                    var name = v.name.toLowerCase();
                    return femaleKeywords.some(function(k) { return name.indexOf(k) !== -1; });
                });
                if (isMaleVoice && maleVoices.length > 0) {
                    utterance.voice = maleVoices[Math.floor(Math.random() * maleVoices.length)];
                    utterance.pitch = 0.85; 
                } else if (!isMaleVoice && femaleVoices.length > 0) {
                    utterance.voice = femaleVoices[Math.floor(Math.random() * femaleVoices.length)];
                    utterance.pitch = 1.15; 
                } else {
                    var randomVoice = enVoices[Math.floor(Math.random() * enVoices.length)];
                    utterance.voice = randomVoice;
                    utterance.pitch = isMaleVoice ? 0.8 : 1.2;
                }
            } else {
                utterance.pitch = isMaleVoice ? 0.8 : 1.2;
            }

            window.speechSynthesis.speak(utterance);
        }
    }

    function initAudioContext() {
        if (!audioCtx) {
            let AudioContext = window.AudioContext || window.webkitAudioContext;
            if (AudioContext) audioCtx = new AudioContext();
        }
        if (audioCtx && audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    function startTimer() {
        clearInterval(timerInterval);
        timeLeft = timeLimit;
        updateTimerDisplay();

        var updateInterval = 100;
        timerInterval = setInterval(function() {
            timeLeft -= updateInterval;
            if (timeLeft <= 0) {
                timeLeft = 0;
                clearInterval(timerInterval);
                timeUp();
            }
            updateTimerDisplay();
        }, updateInterval);
    }

    function updateTimerDisplay() {
        var progressPercent = (timeLeft / timeLimit) * 100;
        document.getElementById('timer-progress').style.width = progressPercent + '%';
        document.getElementById('timer-sec').innerText = (timeLeft / 1000).toFixed(1);
    }

    function timeUp() {
        if (isAnswered) return;
        isAnswered = true;
        clearInterval(timerInterval);
        initAudioContext();
        
        var currentWord = quizQueue[currentWordIndex];
        var correctAnswer = (quizMode === 'ja-en') ? currentWord.en : currentWord.ja;
        var buttons = document.querySelectorAll('.choice-btn');
        for (var i = 0; i < buttons.length; i++) {
            buttons[i].disabled = true;
            if (buttons[i].innerText === correctAnswer) {
                buttons[i].classList.add('correct-choice');
            }
        }

        var resultDiv = document.getElementById('result-message');
        resultDiv.innerText = 'boo! (時間切れ)';
        resultDiv.className = 'result-msg wrong';

        if (quizMode === 'ja-en') {
            speakCurrentWord();
        }

        currentWordIndex++;
        autoNextTimeout = setTimeout(nextQuestion, 1000);
    }

    function checkAnswer(selected, correct, selectedButton) {
        var currentWord = quizQueue[currentWordIndex];
        if (quizMode === 'step-by-step' && isWrongWaiting) {
            if (selected === correct) {
                isWrongWaiting = false;
                currentWordIndex++;
                nextQuestion();
            }
            return;
        }

        if (isAnswered) return;

        initAudioContext();
        var resultDiv = document.getElementById('result-message');
        var buttons = document.querySelectorAll('.choice-btn');
        if (selected === correct) {
            isAnswered = true;
            clearInterval(timerInterval);
            for (var i = 0; i < buttons.length; i++) {
                buttons[i].disabled = true;
                if (buttons[i].innerText === correct) {
                    buttons[i].classList.add('correct-choice');
                }
            }
            resultDiv.innerText = 'right!';
            resultDiv.className = 'result-msg right';
            correctCount++;

            // Limitedモード時、一発正解の単語を累積Setに保存
            if (subMode === 'limited') {
                globalCorrectWords.add(currentWord.en);
            }

            if (quizMode === 'ja-en') {
                speakCurrentWord();
            }

            currentWordIndex++;
            autoNextTimeout = setTimeout(nextQuestion, 1000);
        } else {
            if (quizMode === 'step-by-step') {
                selectedButton.classList.add('wrong-choice');
                resultDiv.innerText = 'boo! 正解をタッチしよう';
                resultDiv.className = 'result-msg wrong';
                
                isWrongWaiting = true;
                for (var i = 0; i < buttons.length; i++) {
                    if (buttons[i].innerText === correct) {
                        buttons[i].classList.add('correct-choice');
                    } else if (buttons[i] !== selectedButton) {
                        buttons[i].disabled = true;
                    }
                }
            } else {
                isAnswered = true;
                clearInterval(timerInterval);
                for (var i = 0; i < buttons.length; i++) {
                    buttons[i].disabled = true;
                    if (buttons[i].innerText === correct) {
                        buttons[i].classList.add('correct-choice');
                    }
                }
                selectedButton.classList.add('wrong-choice');
                resultDiv.innerText = 'boo!';
                resultDiv.className = 'result-msg wrong';

                if (quizMode === 'ja-en') {
                    speakCurrentWord();
                }

                currentWordIndex++;
                autoNextTimeout = setTimeout(nextQuestion, 1000);
            }
        }
    }

    function showResult() {
        clearInterval(timerInterval);
        clearTimeout(autoNextTimeout);
        showScreen('screen-result');
        
        var fractionDisplay = document.getElementById('fraction-text');
        var perfectArea = document.getElementById('perfect-area');
        var stepMsgArea = document.getElementById('step-msg-area');
        var challengeMsg = document.getElementById('challenge-msg');
        var limitedMsgArea = document.getElementById('limited-msg-area');
        var restartBtn = document.getElementById('restart-btn');

        fractionDisplay.style.display = 'none';
        perfectArea.style.display = 'none';
        stepMsgArea.style.display = 'none';
        challengeMsg.style.display = 'none';
        limitedMsgArea.style.display = 'none';

        // 共通タイムスタンプ
        var now = new Date();
        var timeStr = now.getFullYear() + '/' + (now.getMonth()+1) + '/' + now.getDate() + ' ' + now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0') + ':' + now.getSeconds().toString().padStart(2, '0');

        let modeText = '';
        if(quizMode === 'en-ja') modeText = '英 → 日 モード';
        if(quizMode === 'ja-en') modeText = '日 → 英 モード';
        if(quizMode === 'step-by-step') modeText = 'Step-by-Step モード';

        // --- Limited モード終了時の処理 ---
        if (subMode === 'limited') {
            // 【変更】全問題のうちの実質（累積）正解率と、実質正解数を分数で表示
            var limitedScorePercent = Math.round((globalCorrectWords.size / originalList.length) * 100);
            document.getElementById('score-text').innerText = limitedScorePercent + '%';

            fractionDisplay.innerText = globalCorrectWords.size + " / " + originalList.length;
            fractionDisplay.style.display = 'block';

            // 全ての問題で実質正解が出た（累積が全問題数に達した）場合
            if (globalCorrectWords.size >= originalList.length) {
                document.getElementById('score-text').innerText = '100%';
                limitedMsgArea.style.display = 'block';

                // 【機能追加】結果表データを流し込んで表示
                document.getElementById('record-mode').innerText = modeText + " (Limited)";
                document.getElementById('record-count').innerText = attemptCount;
                document.getElementById('record-score').innerText = '100% (累積クリア)';
                document.getElementById('record-time').innerText = timeStr;
                document.getElementById('record-class').innerText = userProfile.class;
                document.getElementById('record-number').innerText = userProfile.number;
                document.getElementById('record-name').innerText = userProfile.name;
                
                perfectArea.style.display = 'block';

                // 【変更】メッセージを切り替えて表示
                challengeMsg.innerText = '次はAll-Out-Attackに挑戦しよう';
                challengeMsg.style.display = 'block';
                
                speakGreat();
                playCelebrationSound();
            } else {
                if (quizMode === 'step-by-step') {
                    stepMsgArea.style.display = 'block';
                }
            }
        }

        // --- All-Out-Attack (通常) モード終了時の処理 ---
        if (subMode === 'all') {
            var scorePercent = Math.round((correctCount / quizQueue.length) * 100);
            document.getElementById('score-text').innerText = scorePercent + '%';

            if (quizMode === 'step-by-step') {
                stepMsgArea.style.display = 'block';
            } else if (scorePercent === 100) {
                document.getElementById('record-mode').innerText = modeText + " (All-Out-Attack)";
                document.getElementById('record-count').innerText = attemptCount;
                document.getElementById('record-score').innerText = scorePercent + '%';
                document.getElementById('record-time').innerText = timeStr;
                document.getElementById('record-class').innerText = userProfile.class;
                document.getElementById('record-number').innerText = userProfile.number;
                document.getElementById('record-name').innerText = userProfile.name;
                
                perfectArea.style.display = 'block';

                // 通常時は元のメッセージを表示
                challengeMsg.innerText = '次は並べ替えに挑戦しよう';
                challengeMsg.style.display = 'block';
                
                speakGreat();
                playCelebrationSound();
            }
        }
        
        restartBtn.innerText = '再挑戦';
    }

    function speakGreat() {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            var utterance = new SpeechSynthesisUtterance("Great!");
            utterance.lang = 'en-US';
            utterance.rate = 0.95;
            utterance.pitch = 1.2;
            window.speechSynthesis.speak(utterance);
        }
    }

    function playCelebrationSound() {
        try {
            initAudioContext();
            if (!audioCtx) return;

            let now = audioCtx.currentTime;
            playWhistle(audioCtx, now + 0.0);
            playWhistle(audioCtx, now + 0.5);
            let bufferSize = audioCtx.sampleRate * 0.08;
            let buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            let data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1;
            }
            
            for (let i = 0; i < 70; i++) {
                let randTime = now + Math.random() * 2.3;
                let source = audioCtx.createBufferSource();
                source.buffer = buffer;
                
                let filter = audioCtx.createBiquadFilter();
                filter.type = 'bandpass';
                filter.frequency.value = 900 + Math.random() * 600;
                filter.Q.value = 2.5;
                let gain = audioCtx.createGain();
                let vol = 0.08 + Math.random() * 0.12;
                gain.gain.setValueAtTime(vol, randTime);
                gain.gain.exponentialRampToValueAtTime(0.001, randTime + 0.04 + Math.random() * 0.04);
                
                source.connect(filter);
                filter.connect(gain);
                gain.connect(audioCtx.destination);
                source.start(randTime);
            }
        } catch(e) {
            console.log("Audio Error:", e);
        }
    }

    function playWhistle(ctx, time) {
        let osc = ctx.createOscillator();
        let gain = ctx.createGain();
        osc.type = 'sine';
        
        osc.frequency.setValueAtTime(1100, time);
        osc.frequency.exponentialRampToValueAtTime(1900, time + 0.12);
        osc.frequency.exponentialRampToValueAtTime(1400, time + 0.35);
        
        gain.gain.setValueAtTime(0, time);
        gain.gain.linearRampToValueAtTime(0.12, time + 0.05);
        gain.gain.linearRampToValueAtTime(0.12, time + 0.25);
        gain.exponentialRampToValueAtTime(0.001, time + 0.35);
        
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(time);
        osc.stop(time + 0.35);
    }

    function restartQuiz() {
        showScreen('screen-mode');
    }
</script>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson 4 Part.2 本文穴埋め練習</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --success-color: #2ec4b6;
            --error-color: #e71d36;
            --bg-color: #f8f9fa;
            --text-color: #333;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 30px;
        }

        .screen {
            display: none;
        }

        .screen.active {
            display: block;
        }

        /* ログイン画面 */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
        }

        .btn-group {
            display: flex;
            gap: 20px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-primary { background-color: var(--primary-color); color: white; }
        .btn-success { background-color: var(--success-color); color: white; }
        .btn-secondary { background-color: #6c757d; color: white; }

        button:hover { opacity: 0.9; }

        /* メインゲーム画面 */
        .game-layout {
            display: flex;
            gap: 30px;
            margin-top: 20px;
        }

        .text-panel {
            flex: 2;
            max-height: 60vh;
            overflow-y: auto;
            padding: 20px;
            border: 2px solid #eee;
            border-radius: 8px;
            background: #fff;
            line-height: 2;
            font-size: 18px;
        }

        .word-panel {
            flex: 1;
            background: #f1f3f5;
            padding: 20px;
            border-radius: 8px;
            max-height: 60vh;
            overflow-y: auto;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-content: flex-start;
        }

        /* ドロップ先（空欄） */
        .blank {
            display: inline-block;
            min-width: 90px;
            height: 30px;
            border-bottom: 2px solid var(--primary-color);
            margin: 0 5px;
            vertical-align: middle;
            text-align: center;
            line-height: 30px;
            font-weight: bold;
            position: relative;
        }

        .blank.correct {
            color: var(--success-color);
            border-bottom-color: var(--success-color);
        }

        .blank.wrong {
            color: var(--error-color);
            border-bottom-color: var(--error-color);
            animation: shake 0.3s;
        }

        /* ドラッグする単語カード */
        .word-card {
            background: white;
            padding: 6px 12px;
            border: 2px solid #dee2e6;
            border-radius: 4px;
            cursor: grab;
            user-select: none;
            font-weight: bold;
        }

        .word-card:active { cursor: grabbing; }
        .word-card.correct-used { background-color: #d4edda; color: #155724; border-color: #c3e6cb; cursor: not-allowed; opacity: 0.6; }
        .word-card.wrong-used { background-color: #f8d7da; color: #721c24; border-color: #f5c6cb; }

        /* フィードバックトースト */
        #feedback {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 1000;
        }
        .fb-right { background-color: var(--success-color); box-shadow: 0 4px 10px rgba(46,196,182,0.4); }
        .fb-boo { background-color: var(--error-color); box-shadow: 0 4px 10px rgba(231,29,54,0.4); }

        /* 結果画面 */
        .result-card {
            background: #eef1f6;
            padding: 30px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .result-item {
            font-size: 20px;
            margin-bottom: 12px;
        }
        .score-huge {
            font-size: 64px;
            font-weight: bold;
            color: var(--success-color);
            text-align: center;
            margin: 20px 0;
        }
        .mistake-list-box {
            background: white;
            border: 1px solid #dee2e6;
            border-radius: 6px;
            padding: 15px;
            margin-top: 10px;
            max-height: 150px;
            overflow-y: auto;
        }
        .mistake-tag {
            display: inline-block;
            background: #f8d7da;
            color: #721c24;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            margin: 4px;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Lesson 4 Part.2 本文穴埋め練習</h1>

    <div id="login-screen" class="screen active">
        <div class="form-group"><label>クラス</label><input type="text" id="input-class" placeholder="例: 7, 8, C2"></div>
        <div class="form-group"><label>番号</label><input type="text" id="input-number" placeholder="例: 13"></div>
        <div class="form-group"><label>氏名</label><input type="text" id="input-name" placeholder="例: 熊谷 誠人"></div>
        
        <div class="btn-group">
            <button class="btn-primary" onclick="startGame('1st Step')">1st Step (都度判定)</button>
            <button class="btn-success" onclick="startGame('2nd Step')">2nd Step (一括判定)</button>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <h2 id="mode-display" style="text-align: center; color: #666;"></h2>
        <div style="margin-bottom: 10px; font-weight: bold;" id="player-info-display"></div>
        <div class="game-layout">
            <div class="text-panel" id="text-panel"></div>
            <div class="word-panel" id="word-panel"></div>
        </div>
        <div class="btn-group">
            <button class="btn-secondary" onclick="backToMenu()">戻る</button>
        </div>
    </div>

    <div id="result-screen" class="screen">
        <h2>練習結果</h2>
        <div class="result-card">
            <div class="score-huge" id="res-score">🎉100%🎉</div>
            <div class="result-item"><strong>モード:</strong> <span id="res-mode"></span></div>
            <div class="result-item"><strong>クラス:</strong> <span id="res-class"></span></div>
            <div class="result-item"><strong>番号:</strong> <span id="res-number"></span></div>
            <div class="result-item"><strong>氏名:</strong> <span id="res-name"></span></div>
            <div class="result-item"><strong>完了日時:</strong> <span id="res-time"></span></div>
            <div class="result-item"><strong>間違えた回数:</strong> <span id="res-mistakes" style="color: var(--error-color); font-weight: bold;"></span> 回</div>
            <div class="result-item" id="mistake-list-container">
                <strong>間違えた単語のリスト:</strong>
                <div class="mistake-list-box" id="res-mistake-list"></div>
            </div>
        </div>
        <button class="btn-primary" style="width:100%" onclick="backToMenu()">もう一度解く / モード選択へ戻る</button>
    </div>
</div>

<div id="feedback"></div>

<script>
// 修正：people を削除して全18語に変更
const targetWords = {
    1: "back", 2: "at", 3: "idea", 4: "across", 5: "titled",
    6: "whales", 7: "caribou", 8: "author", 9: "inspired", 10: "decided",
    11: "what", 12: "turn", 13: "quit", 14: "entered", 15: "studied",
    16: "including", 17: "social", 18: "native"
};

// 修正：people を空欄ではなく通常のテキストに変更
const fullTextStructure = [
    { type: 'text', content: '&nbsp;&nbsp;&nbsp;' }, { type: 'blank', id: 1 }, { type: 'text', content: ' in 1994, Matsumoto was a university student in Japan.<br>&nbsp;&nbsp;&nbsp;' },
    { type: 'blank', id: 2 }, { type: 'text', content: ' that time, he had no ' }, { type: 'blank', id: 3 }, { type: 'text', content: ' what he wanted to do with his life. One day, he came ' },
    { type: 'blank', id: 4 }, { type: 'text', content: ' a book ' }, { type: 'blank', id: 5 }, { type: 'text', content: ' <i>Alaska</i> in a bookstore. It included photos of ' },
    { type: 'blank', id: 6 }, { type: 'text', content: ' in Southeast Alaska and of ' }, { type: 'blank', id: 7 }, { type: 'text', content: ' in the Arctic. Its ' },
    { type: 'blank', id: 8 }, { type: 'text', content: ' was Hoshino Michio.<br>&nbsp;&nbsp;&nbsp;Matsumoto was ' },
    { type: 'blank', id: 9 }, { type: 'text', content: ' by Hoshino’s photos and ' }, { type: 'blank', id: 10 }, { type: 'text', content: ' to become a nature photographer. He thought he would be able to pursue ' },
    { type: 'blank', id: 11 }, { type: 'text', content: ' was beautiful and ' }, { type: 'blank', id: 12 }, { type: 'text', content: ' it into his works of art. Matsumoto ' },
    { type: 'blank', id: 13 }, { type: 'text', content: ' university in Japan and ' }, { type: 'blank', id: 14 }, { type: 'text', content: ' the University of Alaska Southeast. He ' },
    { type: 'blank', id: 15 }, { type: 'text', content: ' many different aspects of Alaska, ' }, { type: 'blank', id: 16 }, { type: 'text', content: ' its history, ' },
    { type: 'blank', id: 17 }, { type: 'text', content: ' problems, and ' }, { type: 'blank', id: 18 }, { type: 'text', content: ' people.' }
];

const totalBlanksCount = 18; // 修正：空欄総数を18箇所に調整
let currentMode = '';
let mistakeCount = 0;
let userAnswers = {};
let mistakenWordsSet = new Set();
let audioCtx = null;

function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playSound(type) {
    initAudio();
    if (!audioCtx) return;
    if (type === 'right') {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(660, audioCtx.currentTime); 
        osc.frequency.setValueAtTime(880, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
        osc.start(); osc.stop(audioCtx.currentTime + 0.4);
    } 
    else if (type === 'tada') {
        const now = audioCtx.currentTime;
        playTone(523.25, now, 0.15); // ド
        playTone(659.25, now, 0.15); // ミ
        playTone(783.99, now, 0.15); // ソ
        
        playTone(523.25, now + 0.18, 0.6); // ド
        playTone(659.25, now + 0.18, 0.6); // ミ
        playTone(783.99, now + 0.18, 0.6); // ソ
        playTone(1046.50, now + 0.18, 0.6); // 高いド
    } 
    else {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(150, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
        osc.start(); osc.stop(audioCtx.currentTime + 0.5);
    }
}

function playTone(freq, startTime, duration) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(freq, startTime);
    gain.gain.setValueAtTime(0.2, startTime);
    gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(startTime);
    osc.stop(startTime + duration);
}

function showScreen(screenId) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(screenId).classList.add('active');
}

function startGame(mode) {
    currentMode = mode;
    mistakeCount = 0;
    userAnswers = {};
    mistakenWordsSet.clear();
    const clazz = document.getElementById('input-class').value || '未入力';
    const num = document.getElementById('input-number').value || '未入力';
    const name = document.getElementById('input-name').value || '未入力';
    document.getElementById('mode-display').innerText = currentMode;
    document.getElementById('player-info-display').innerText = `参加者: ${clazz} ${num}番 ${name}`;
    
    buildGameBoard();
    showScreen('game-screen');
}

function backToMenu() {
    showScreen('login-screen');
}

function showToast(message, isRight) {
    const fb = document.getElementById('feedback');
    fb.innerText = message;
    fb.className = isRight ? 'fb-right' : 'fb-boo';
    fb.style.opacity = '1';
    setTimeout(() => { fb.style.opacity = '0'; }, 800);
}

function buildGameBoard() {
    const textPanel = document.getElementById('text-panel');
    const wordPanel = document.getElementById('word-panel');
    textPanel.innerHTML = '';
    wordPanel.innerHTML = '';
    fullTextStructure.forEach(item => {
        if (item.type === 'text') {
            const span = document.createElement('span');
            span.innerHTML = item.content;
            textPanel.appendChild(span);
        } else if (item.type === 'blank') {
            const blank = document.createElement('div');
            blank.className = 'blank';
            blank.id = `blank-${item.id}`;
            blank.dataset.id = item.id;
            
            blank.ondragover = (e) => e.preventDefault();
            blank.ondrop = (e) => handleDrop(e, item.id);
            
            textPanel.appendChild(blank);
        }
    });

    const shuffledWords = Object.values(targetWords).sort(() => Math.random() - 0.5);
    shuffledWords.forEach((word, index) => {
        const card = document.createElement('div');
        card.className = 'word-card';
        card.innerText = word;
        card.draggable = true;
        card.id = `word-card-${index}`;
        card.ondragstart = (e) => {
            e.dataTransfer.setData('text/plain', JSON.stringify({word: word, cardId: card.id}));
        };
        wordPanel.appendChild(card);
    });
}

function handleDrop(e, blankId) {
    e.preventDefault();
    const data = JSON.parse(e.dataTransfer.getData('text/plain'));
    const draggedWord = data.word;
    const cardId = data.cardId;
    const blankEl = document.getElementById(`blank-${blankId}`);
    const cardEl = document.getElementById(cardId);

    if (currentMode === '1st Step') {
        if (blankEl.classList.contains('correct')) return;
        if (targetWords[blankId] === draggedWord) {
            playSound('right');
            showToast('right!', true);
            blankEl.innerText = draggedWord;
            blankEl.className = 'blank correct';
            cardEl.className = 'word-card correct-used';
            cardEl.draggable = false;
            userAnswers[blankId] = draggedWord;
            checkGameCompletion();
        } else {
            playSound('wrong');
            showToast('boo!', false);
            mistakeCount++;
            mistakenWordsSet.add(targetWords[blankId]);
            
            cardEl.classList.add('wrong-used');
            blankEl.classList.add('wrong');
            setTimeout(() => { blankEl.classList.remove('wrong'); }, 500);
        }
    } else if (currentMode === '2nd Step') {
        blankEl.innerText = draggedWord;
        blankEl.className = 'blank'; 
        userAnswers[blankId] = draggedWord;
        
        cardEl.className = 'word-card correct-used';

        if (Object.keys(userAnswers).length === totalBlanksCount) {
            setTimeout(evaluateSecondStep, 1000);
        }
    }
}

function evaluateSecondStep() {
    let allCorrect = true;
    for (let id = 1; id <= totalBlanksCount; id++) {
        const blankEl = document.getElementById(`blank-${id}`);
        const userAns = userAnswers[id];
        
        if (targetWords[id] === userAns) {
            blankEl.className = 'blank correct';
        } else {
            blankEl.className = 'blank wrong';
            allCorrect = false;
            mistakeCount++;
            mistakenWordsSet.add(targetWords[id]);
            
            const cards = document.querySelectorAll('.word-card');
            cards.forEach(card => {
                if (card.innerText === userAns) {
                    card.className = 'word-card'; 
                    card.draggable = true;
                }
            });
            blankEl.innerText = '';
            delete userAnswers[id];
        }
    }

    if (allCorrect) {
        playSound('tada');
        showGameResult();
    } else {
        playSound('wrong');
    }
}

function checkGameCompletion() {
    if (Object.keys(userAnswers).length === totalBlanksCount) {
        setTimeout(() => {
            playSound('tada');
            showGameResult();
        }, 500);
    }
}

function showGameResult() {
    const now = new Date();
    const timeStr = `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;

    document.getElementById('res-mode').innerText = currentMode;
    document.getElementById('res-class').innerText = document.getElementById('input-class').value || '未入力';
    document.getElementById('res-number').innerText = document.getElementById('input-number').value || '未入力';
    document.getElementById('res-name').innerText = document.getElementById('input-name').value || '未入力';
    document.getElementById('res-time').innerText = timeStr;
    document.getElementById('res-mistakes').innerText = mistakeCount;

    const listContainer = document.getElementById('res-mistake-list');
    listContainer.innerHTML = '';
    if (mistakenWordsSet.size > 0) {
        document.getElementById('mistake-list-container').style.display = 'block';
        mistakenWordsSet.forEach(word => {
            const tag = document.createElement('span');
            tag.className = 'mistake-tag';
            tag.innerText = word;
            listContainer.appendChild(tag);
        });
    } else {
        listContainer.innerHTML = '<span style="color: #2ec4b6; font-weight: bold;">なし！素晴らしいパフォーマンスです！</span>';
    }

    showScreen('result-screen');
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson 4 Part.3 本文穴埋め練習</title>
    <style>
        :root {
            /* 全体を紫系統（ディープパープル／アメジスト）に統一 */
            --primary-color: #6a1b9a;    /* 落ち着いた深みのある紫 */
            --success-color: #8e24aa;    /* 正解時：明るめの紫 */
            --error-color: #d32f2f;      /* 不正解時：視認性の高い赤（そのまま維持） */
            --bg-color: #f3e5f5;         /* 背景色：ごく薄い藤色・ラベンダー */
            --text-color: #2a1b3d;       /* 文字色：暗い濃紫 */
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color); /* [cite: 162] */
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 1000px; /* [cite: 164] */
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(106, 27, 154, 0.15); /* 紫系統の淡い影 */
        }

        h1 {
            text-align: center;
            color: var(--primary-color); /* [cite: 166] */
            margin-bottom: 30px;
        }

        .screen {
            display: none; /* [cite: 167] */
        }

        .screen.active {
            display: block; /* [cite: 168] */
        }

        /* ログイン画面 */
        .form-group {
            margin-bottom: 20px; /* [cite: 169] */
        }

        label {
            display: block;
            margin-bottom: 8px; /* [cite: 170] */
            font-weight: bold;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px; /* [cite: 171] */
            border: 2px solid #e1bee7; /* 薄い紫のボーダー */
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box; /* [cite: 172] */
        }
        
        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .btn-group {
            display: flex;
            gap: 20px; /* [cite: 173] */
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 15px; /* [cite: 174] */
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s; /* [cite: 175] */
        }

        .btn-primary { background-color: var(--primary-color); color: white; }
        .btn-success { background-color: var(--success-color); color: white; }
        .btn-secondary { background-color: #7b1fa2; color: white; } /* 中間の紫 */

        button:hover { opacity: 0.9; }

        /* メインゲーム画面 */
        .game-layout {
            display: flex;
            gap: 30px; /* [cite: 180] */
            margin-top: 20px;
        }

        .text-panel {
            flex: 2;
            max-height: 60vh; /* [cite: 181] */
            overflow-y: auto;
            padding: 20px;
            border: 2px solid #f3e5f5;
            border-radius: 8px;
            background: #fff;
            line-height: 2;
            font-size: 18px; /* [cite: 182] */
        }

        .word-panel {
            flex: 1;
            background: #f3e5f5; /* パネル背景も薄い紫 */
            padding: 20px;
            border-radius: 8px;
            max-height: 60vh;
            overflow-y: auto;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-content: flex-start; /* [cite: 184] */
        }

        /* ドロップ先（空欄） */
        .blank {
            display: inline-block;
            min-width: 90px; /* [cite: 185] */
            height: 30px;
            border-bottom: 2px solid var(--primary-color);
            margin: 0 5px;
            vertical-align: middle;
            text-align: center;
            line-height: 30px;
            font-weight: bold;
            position: relative; /* [cite: 186] */
        }

        .blank.correct {
            color: var(--success-color);
            border-bottom-color: var(--success-color); /* [cite: 187] */
        }

        .blank.wrong {
            color: var(--error-color);
            border-bottom-color: var(--error-color); /* [cite: 188] */
            animation: shake 0.3s;
        }

        /* ドラッグする単語カード */
        .word-card {
            background: white;
            padding: 6px 12px; /* [cite: 189] */
            border: 2px solid #e1bee7;
            border-radius: 4px;
            cursor: grab;
            user-select: none;
            font-weight: bold; /* [cite: 190] */
            color: var(--primary-color);
        }

        .word-card:active { cursor: grabbing; }
        .word-card.correct-used { background-color: #f3e5f5; color: #ba68c8; border-color: #e1bee7; cursor: not-allowed; opacity: 0.6; }
        .word-card.wrong-used { background-color: #f8d7da; color: #721c24; border-color: #f5c6cb; }

        /* フィードバックトースト */
        #feedback {
            position: fixed;
            top: 20px; /* [cite: 194] */
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            opacity: 0;
            transition: opacity 0.2s; /* [cite: 195] */
            z-index: 1000;
        }
        .fb-right { background-color: var(--success-color); box-shadow: 0 4px 10px rgba(142,36,170,0.4); }
        .fb-boo { background-color: var(--error-color); box-shadow: 0 4px 10px rgba(231,29,54,0.4); }

        /* 結果画面 */
        .result-card {
            background: #f3e5f5;
            padding: 30px; /* [cite: 198] */
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .result-item {
            font-size: 20px;
            margin-bottom: 12px; /* [cite: 199] */
        }
        .score-huge {
            font-size: 64px;
            font-weight: bold; /* [cite: 200] */
            color: var(--success-color);
            text-align: center;
            margin: 20px 0;
        }
        .mistake-list-box {
            background: white;
            border: 1px solid #e1bee7; /* [cite: 201] */
            border-radius: 6px;
            padding: 15px;
            margin-top: 10px;
            max-height: 150px;
            overflow-y: auto;
        }
        .mistake-tag {
            display: inline-block;
            background: #f8d7da; /* [cite: 203] */
            color: #721c24;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            margin: 4px; /* [cite: 204] */
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); } /* [cite: 205] */
            25% { transform: translateX(-4px); } /* [cite: 206] */
            75% { transform: translateX(4px); } /* [cite: 207] */
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Lesson 4 Part.3 本文穴埋め練習</h1>

    <div id="login-screen" class="screen active">
        <div class="form-group"><label>クラス</label><input type="text" id="input-class" placeholder="例: 7, 8, C2"></div>
        <div class="form-group"><label>番号</label><input type="text" id="input-number" placeholder="例: 13"></div>
        <div class="form-group"><label>氏名</label><input type="text" id="input-name" placeholder="例: 熊谷 誠人"></div>
        
        <div class="btn-group">
            <button class="btn-primary" onclick="startGame('1st Step')">1st Step (都度判定)</button> <button class="btn-success" onclick="startGame('2nd Step')">2nd Step (一括判定)</button>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <h2 id="mode-display" style="text-align: center; color: #5c2575;"></h2>
        <div style="margin-bottom: 10px; font-weight: bold;" id="player-info-display"></div> <div class="game-layout">
            <div class="text-panel" id="text-panel"></div>
            <div class="word-panel" id="word-panel"></div>
        </div>
        <div class="btn-group">
            <button class="btn-secondary" onclick="backToMenu()">戻る</button>
        </div>
    </div>

    <div id="result-screen" class="screen">
        <h2>練習結果</h2>
        <div class="result-card"> <div class="score-huge" id="res-score">🎉100%🎉</div>
            <div class="result-item"><strong>モード:</strong> <span id="res-mode"></span></div>
            <div class="result-item"><strong>クラス:</strong> <span id="res-class"></span></div>
            <div class="result-item"><strong>番号:</strong> <span id="res-number"></span></div>
            <div class="result-item"><strong>氏名:</strong> <span id="res-name"></span></div>
            <div class="result-item"><strong>完了日時:</strong> <span id="res-time"></span></div>
            <div class="result-item"><strong>間違えた回数:</strong> <span id="res-mistakes" style="color: var(--error-color); font-weight: bold;"></span> 回</div> <div class="result-item" id="mistake-list-container">
                <strong>間違えた単語のリスト:</strong>
                <div class="mistake-list-box" id="res-mistake-list"></div>
            </div>
        </div>
        <button class="btn-primary" style="width:100%" onclick="backToMenu()">もう一度解く / モード選択へ戻る</button>
    </div>
</div>

<div id="feedback"></div>

<script>
// Lesson 4 Part.3 のターゲット単語（全11語）
const targetWords = {
    1: "spends", 2: "deserted", 3: "glacier", 4: "lights", 5: "been",
    6: "for", 7: "staying", 8: "where", 9: "drops", 10: "process",
    11: "regrets", 12: "life"
};

// Lesson 4 Part.3 の本文構造データ
const fullTextStructure = [
    { type: 'text', content: '&nbsp;&nbsp;&nbsp;Now, in summer, Matsumoto ' }, { type: 'blank', id: 1 }, { type: 'text', content: ' two months camping on a ' },
    { type: 'blank', id: 2 }, { type: 'text', content: ' island in Southeast Alaska to take photos of whales.<br>&nbsp;&nbsp;&nbsp;In winter, he spends two months camping on a ' },
    { type: 'blank', id: 3 }, { type: 'text', content: ' to take photos of the northern ' }, { type: 'blank', id: 4 }, { type: 'text', content: '.<br>&nbsp;&nbsp;&nbsp;He has ' },
    { type: 'blank', id: 5 }, { type: 'text', content: ' doing this ' }, { type: 'blank', id: 6 }, { type: 'text', content: ' more than 20 years.<br>&nbsp;&nbsp;&nbsp;Matsumoto says, “You can take photos of the northern lights in spring or in fall, ' },
    { type: 'blank', id: 7 }, { type: 'text', content: ' at a hotel. However, I spend two winter months in a place ' },
    { type: 'blank', id: 8 }, { type: 'text', content: ' the temperature ' }, { type: 'blank', id: 9 }, { type: 'text', content: ' to minus 40 degrees Celsius. This is because the ' },
    { type: 'blank', id: 10 }, { type: 'text', content: ' is important. I don’t want to have any ' },
    { type: 'blank', id: 11 }, { type: 'text', content: ' concerning my photography. I don’t want to regret my ' },
    { type: 'blank', id: 12 }, { type: 'text', content: ', either.”' }
];

const totalBlanksCount = 12; // Part.3 の空欄総数（全12箇所）
let currentMode = '';
let mistakeCount = 0;
let userAnswers = {};
let mistakenWordsSet = new Set(); /* [cite: 226] */
let audioCtx = null;

function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); /* [cite: 227] */
}

function playSound(type) {
    initAudio();
    if (!audioCtx) return;
    if (type === 'right') { /* [cite: 228] */
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain(); /* [cite: 229] */
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(660, audioCtx.currentTime); 
        osc.frequency.setValueAtTime(880, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4); /* [cite: 230] */
        osc.start(); osc.stop(audioCtx.currentTime + 0.4);
    } 
    else if (type === 'tada') {
        const now = audioCtx.currentTime;
        playTone(523.25, now, 0.15); /* [cite: 231] */
        playTone(659.25, now, 0.15); /* [cite: 232] */
        playTone(783.99, now, 0.15); /* [cite: 233] */
        
        playTone(523.25, now + 0.18, 0.6); /* [cite: 234] */
        playTone(659.25, now + 0.18, 0.6); /* [cite: 235] */
        playTone(783.99, now + 0.18, 0.6); /* [cite: 236] */
        playTone(1046.50, now + 0.18, 0.6); /* [cite: 237] */
    } 
    else {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain(); /* [cite: 239] */
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(150, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.5); /* [cite: 240] */
    }
}

function playTone(freq, startTime, duration) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'triangle'; /* [cite: 241] */
    osc.frequency.setValueAtTime(freq, startTime);
    gain.gain.setValueAtTime(0.2, startTime);
    gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(startTime);
    osc.stop(startTime + duration); /* [cite: 242] */
}

function showScreen(screenId) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(screenId).classList.add('active'); /* [cite: 243] */
}

function startGame(mode) {
    currentMode = mode;
    mistakeCount = 0;
    userAnswers = {};
    mistakenWordsSet.clear();
    const clazz = document.getElementById('input-class').value || '未入力'; /* [cite: 244] */
    const num = document.getElementById('input-number').value || '未入力';
    const name = document.getElementById('input-name').value || '未入力';
    document.getElementById('mode-display').innerText = currentMode; /* [cite: 245] */
    document.getElementById('player-info-display').innerText = `参加者: ${clazz} ${num}番 ${name}`;
    
    buildGameBoard();
    showScreen('game-screen');
}

function backToMenu() {
    showScreen('login-screen'); /* [cite: 245] */
}

function showToast(message, isRight) {
    const fb = document.getElementById('feedback');
    fb.innerText = message;
    fb.className = isRight ? 'fb-right' : 'fb-boo'; /* [cite: 247] */
    fb.style.opacity = '1';
    setTimeout(() => { fb.style.opacity = '0'; }, 800); /* [cite: 248] */
}

function buildGameBoard() {
    const textPanel = document.getElementById('text-panel');
    const wordPanel = document.getElementById('word-panel');
    textPanel.innerHTML = '';
    wordPanel.innerHTML = '';
    fullTextStructure.forEach(item => { /* [cite: 249] */
        if (item.type === 'text') {
            const span = document.createElement('span');
            span.innerHTML = item.content;
            textPanel.appendChild(span);
        } else if (item.type === 'blank') {
            const blank = document.createElement('div');
            blank.className = 'blank';
            blank.id = `blank-${item.id}`; /* [cite: 250] */
            blank.dataset.id = item.id;
            
            blank.ondragover = (e) => e.preventDefault();
            blank.ondrop = (e) => handleDrop(e, item.id);
            
            textPanel.appendChild(blank);
        }
    });

    const shuffledWords = Object.values(targetWords).sort(() => Math.random() - 0.5);
    shuffledWords.forEach((word, index) => { /* [cite: 252] */
        const card = document.createElement('div');
        card.className = 'word-card';
        card.innerText = word;
        card.draggable = true;
        card.id = `word-card-${index}`;
        card.ondragstart = (e) => {
            e.dataTransfer.setData('text/plain', JSON.stringify({word: word, cardId: card.id}));
        };
        wordPanel.appendChild(card);
    });
}

function handleDrop(e, blankId) {
    e.preventDefault();
    const data = JSON.parse(e.dataTransfer.getData('text/plain'));
    const draggedWord = data.word;
    const cardId = data.cardId; /* [cite: 254] */
    const blankEl = document.getElementById(`blank-${blankId}`);
    const cardEl = document.getElementById(cardId);

    if (currentMode === '1st Step') { /* [cite: 255] */
        if (blankEl.classList.contains('correct')) return;
        if (targetWords[blankId] === draggedWord) { /* [cite: 256] */
            playSound('right');
            showToast('right!', true);
            blankEl.innerText = draggedWord; /* [cite: 257] */
            blankEl.className = 'blank correct';
            cardEl.className = 'word-card correct-used';
            cardEl.draggable = false;
            userAnswers[blankId] = draggedWord;
            checkGameCompletion();
        } else {
            playSound('wrong'); /* [cite: 258] */
            showToast('boo!', false);
            mistakeCount++;
            mistakenWordsSet.add(targetWords[blankId]);
            
            cardEl.classList.add('wrong-used');
            blankEl.classList.add('wrong'); /* [cite: 259] */
            setTimeout(() => { blankEl.classList.remove('wrong'); }, 500);
        }
    } else if (currentMode === '2nd Step') {
        blankEl.innerText = draggedWord;
        blankEl.className = 'blank'; /* [cite: 260] */
        userAnswers[blankId] = draggedWord;
        
        cardEl.className = 'word-card correct-used';

        if (Object.keys(userAnswers).length === totalBlanksCount) {
            setTimeout(evaluateSecondStep, 1000);
        }
    }
}

function evaluateSecondStep() {
    let allCorrect = true;
    for (let id = 1; id <= totalBlanksCount; id++) { /* [cite: 262] */
        const blankEl = document.getElementById(`blank-${id}`);
        const userAns = userAnswers[id]; /* [cite: 263] */
        
        if (targetWords[id] === userAns) {
            blankEl.className = 'blank correct';
        } else { /* [cite: 264] */
            blankEl.className = 'blank wrong';
            allCorrect = false; /* [cite: 265] */
            mistakeCount++;
            mistakenWordsSet.add(targetWords[id]);
            
            const cards = document.querySelectorAll('.word-card');
            cards.forEach(card => {
                if (card.innerText === userAns) {
                    card.className = 'word-card'; 
                    card.draggable = true;
                }
            });
            blankEl.innerText = '';
            delete userAnswers[id]; /* [cite: 266] */
        }
    }

    if (allCorrect) {
        playSound('tada');
        showGameResult(); /* [cite: 268] */
    } else {
        playSound('wrong');
    }
}

function checkGameCompletion() {
    if (Object.keys(userAnswers).length === totalBlanksCount) {
        setTimeout(() => {
            playSound('tada');
            showGameResult();
        }, 500);
    }
}

function showGameResult() {
    const now = new Date();
    const timeStr = `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;

    document.getElementById('res-mode').innerText = currentMode;
    document.getElementById('res-class').innerText = document.getElementById('input-class').value || '未入力'; /* [cite: 271] */
    document.getElementById('res-number').innerText = document.getElementById('input-number').value || '未入力';
    document.getElementById('res-name').innerText = document.getElementById('input-name').value || '未入力';
    document.getElementById('res-time').innerText = timeStr;
    document.getElementById('res-mistakes').innerText = mistakeCount; /* [cite: 272] */

    const listContainer = document.getElementById('res-mistake-list');
    listContainer.innerHTML = '';
    if (mistakenWordsSet.size > 0) { /* [cite: 273] */
        document.getElementById('mistake-list-container').style.display = 'block';
        mistakenWordsSet.forEach(word => { /* [cite: 274] */
            const tag = document.createElement('span');
            tag.className = 'mistake-tag';
            tag.innerText = word;
            listContainer.appendChild(tag);
        });
    } else {
        listContainer.innerHTML = '<span style="color: #8e24aa; font-weight: bold;">なし！素晴らしいパフォーマンスです！</span>';
    }

    showScreen('result-screen');
}
</script>

</body>
</html>

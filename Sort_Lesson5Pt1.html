<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英語並べ替え練習問題 Lesson 5 Pt.1</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root {
            --primary-color: #2b6cb0;    /* 深みのあるブルー */
            --accent-color: #4299e1;     /* 鮮やかなライトブルー */
            --bg-color: #ebf8ff;         /* 淡いスノーブルーの背景 */
            --success-color: #319795;    /* ブルー寄りのティール・グリーン */
            --error-color: #c53030;      /* 警告用の赤（視認性確保のため） */
            --box-bg-light: #f7fafc;     /* すっきりした白に近いグレー */
            --area-blue-bg: #ebf8ff;     /* エリア用の薄い青 */
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(43, 108, 176, 0.1);
            width: 100%;
            max-width: 650px;
            position: relative;
            border: 1px solid #bee3f8;
        }
        h1, h2 {
            color: #2d3748;
            text-align: center;
            margin-top: 0;
        }
        h1 { font-size: 1.5rem; margin-bottom: 5px; color: var(--primary-color); }
        .sub-comment {
            text-align: center;
            color: #4a5568;
            font-size: 0.9rem;
            margin-bottom: 24px;
        }
        .hidden { display: none !important; }
        
        /* モード選択エリア */
        .mode-select-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin: 20px 0;
        }
        .mode-btn {
            width: 100%;
            padding: 20px;
            border: 2px solid #e2e8f0;
            background: #fff;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1rem;
            color: #4a5568;
            transition: all 0.2s;
            text-align: left;
            box-sizing: border-box;
        }
        .mode-btn small {
            display: block;
            font-weight: normal;
            color: #718096;
            margin-top: 5px;
            font-size: 0.85rem;
        }
        .mode-btn:hover {
            border-color: var(--accent-color);
            background-color: #f7fafc;
        }
        .mode-btn.active {
            border-color: var(--primary-color);
            background-color: #ebf8ff;
            color: var(--primary-color);
        }
        .mode-btn.active small {
            color: #4299e1;
        }

        /* 入力画面 */
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #4a5568; }
        input[type="text"] {
            width: 100%;
            padding: 10px; border: 1px solid #cbd5e0; border-radius: 6px;
            box-sizing: border-box; font-size: 1rem;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.2);
        }
        button {
            width: 100%;
            padding: 12px; background-color: var(--primary-color); color: white;
            border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; font-weight: bold;
            transition: background 0.2s;
            margin-top: 10px;
        }
        button:hover { background-color: #2b5c8f; }

        /* クイズ画面 */
        .info-bar {
            display: flex;
            justify-content: space-between; align-items: center;
            font-size: 0.9rem; color: #4a5568; margin-bottom: 15px; border-bottom: 1px solid #e2e8f0; padding-bottom: 10px;
        }
        .timer { font-weight: bold; color: var(--error-color); font-size: 1.1rem; }
        .hint-jp {
            font-size: 1.2rem;
            font-weight: bold; color: #2d3748; margin-bottom: 20px;
            background: #ebf8ff; padding: 15px; border-radius: 8px; border-left: 5px solid var(--accent-color);
        }
        
        /* エリア共通設定 */
        .zone-title {
            font-size: 0.85rem;
            color: #4a5568; font-weight: bold; margin-bottom: 5px; margin-top: 15px;
        }
        .sentence-container {
            display: flex;
            align-items: flex-end; gap: 10px; width: 100%;
        }
        .sortable-list {
            display: flex;
            flex-wrap: wrap; gap: 10px; min-height: 60px; padding: 10px;
            background: #fff; border: 2px dashed #90cdf4; border-radius: 8px; flex-grow: 1;
        }
        .trash-list {
            display: flex;
            flex-wrap: wrap; gap: 10px; min-height: 60px; padding: 10px;
            background: #f7fafc; border: 2px dashed #cbd5e0; border-radius: 8px;
        }
        .fixed-mark {
            font-size: 1.8rem;
            font-weight: bold; color: #2d3748; padding-bottom: 5px; min-width: 15px;
        }
        .word-item {
            background-color: #fff;
            padding: 8px 16px; border: 1px solid #bee3f8;
            border-radius: 20px; cursor: grab; user-select: none;
            box-shadow: 0 2px 4px rgba(43, 108, 176, 0.05); font-size: 1.1rem;
            font-weight: 500; color: #2d3748;
        }
        .word-item:active { cursor: grabbing; background-color: #ebf8ff; }
        
        /* 丸判定用オーバーレイ */
        .feedback {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 16px; display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: white;
            font-size: 2.5rem; font-weight: bold; z-index: 10; opacity: 0.96; text-align: center; padding: 20px; box-sizing: border-box;
        }
        .feedback.correct { background-color: var(--success-color); }
        .feedback.incorrect { background-color: var(--error-color); }
        
        /* 不正解時・詳細表示エリア */
        .wrong-details-container {
            font-size: 1.1rem;
            margin-top: 15px; font-weight: normal; 
            background: rgba(0,0,0,0.25); padding: 15px; border-radius: 8px; width: 90%; text-align: left; box-sizing: border-box;
        }
        .wrong-details-container div { margin-bottom: 8px; line-height: 1.4; }
        .wrong-details-container div:last-child { margin-bottom: 0; }
        .wrong-label { font-weight: bold; font-size: 0.85rem; opacity: 0.8; display: block; margin-bottom: 2px; }
        .diff-text { background: transparent; padding: 2px 4px; border-radius: 4px; }
        .diff-text.wrong-part { background-color: #e53e3e; text-decoration: line-through; font-weight: bold; }

        /* Step-by-step用の次へボタン */
        .next-btn-container {
            width: 90%;
            margin-top: 15px;
        }
        .next-btn-container button {
            background-color: #fff;
            color: #2d3748;
            border: 2px solid #fff;
        }
        .next-btn-container button:hover {
            background-color: #edf2f7;
        }

        /* 結果画面 */
        .result-box {
            background: #fff;
            border: 2px solid #bee3f8; padding: 20px; border-radius: 8px; margin-top: 15px; text-align: left;
        }
        .result-box p { margin: 8px 0; font-size: 1rem; color: #4a5568; }
        .accent-text { font-weight: bold; color: var(--primary-color); font-size: 1.3rem; }
        .next-mode-msg {
            margin-top: 15px;
            padding: 12px;
            background: #ebf8ff;
            border: 1px solid #90cdf4;
            border-radius: 6px;
            color: #2b6cb0;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="feedback-screen" class="feedback hidden">
        <div id="feedback-text">Right!</div>
        <div id="wrong-details-screen" class="wrong-details-container hidden">
            <div>
                <span class="wrong-label">あなたの解答:</span>
                <span id="user-answer-display"></span>
            </div>
            <div>
                <span class="wrong-label">正しい解答:</span>
                <span id="correct-answer-display"></span>
            </div>
        </div>
        <div id="next-btn-zone" class="next-btn-container hidden">
            <button id="next-question-btn">次へ進む ➔</button>
        </div>
    </div>

    <div id="login-screen">
        <h1 id="quiz-title">英語並べ替え練習問題 Lesson 5 Pt.1</h1>
        <div class="sub-comment">先頭の語も小文字になっています。1つ使わない語句が入っています。</div>
        
        <div class="form-group">
            <label for="class-num">クラス</label>
            <input type="text" id="class-num" placeholder="例: 8, C2" required autocomplete="off">
        </div>
        <div class="form-group">
            <label for="student-num">番号</label>
            <input type="text" id="student-num" placeholder="例: 13, D2" required autocomplete="off">
        </div>
        <div class="form-group">
            <label for="user-name">名前</label>
            <input type="text" id="user-name" placeholder="例: 寺部だい" required autocomplete="off">
        </div>
        <button id="next-to-mode-btn">次へ（モード選択）</button>
    </div>

    <div id="mode-screen" class="hidden">
        <h2>モード選択</h2>
        <div class="sub-comment">挑戦するスタイルを選んでください。</div>
        
        <div class="mode-select-container">
            <button type="button" class="mode-btn" id="mode-step" data-mode="step">
                ➔ Step-by-Step モード
                <small>制限時間なし。出題順は固定（並び替えなし）。教科書をじっくり確認しながら進みます。</small>
            </button>
            <button type="button" class="mode-btn" id="mode-speed" data-mode="speed">
                ➔ Speed Mode
                <small>制限時間30秒！問題は毎回ランダム。テンポよく自動で進むタイムアタックです。</small>
            </button>
        </div>
        <button id="back-to-login-btn" style="background-color: #718096;">戻る</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <div class="info-bar">
            <span id="display-user"></span>
            <span class="timer" id="timer-zone">残り時間: <span id="time-left">30</span>秒</span>
            <span id="progress"></span>
        </div>
        <div class="hint-jp" id="hint-jp">日本語のヒント</div>
        
        <div class="zone-title">解答エリア（正しい順に並べてください）</div>
        <div class="sentence-container">
            <div id="list-answer" class="sortable-list"></div>
            <div id="fixed-mark" class="fixed-mark">.</div>
        </div>
        
        <div class="zone-title">使わない語句エリア（不要なパーツはここへ退避）</div>
        <div id="list-trash" class="trash-list"></div>
        
        <button id="check-btn">確認する</button>
    </div>

    <div id="result-screen" class="hidden">
        <h2 id="result-status-title">結果発表</h2>
        <div class="result-box">
            <p><strong>モード:</strong> <span id="res-mode" style="font-weight:bold; color:var(--primary-color);"></span></p>
            <p><strong>クラス・番号 名前:</strong> <span id="res-user"></span></p>
            <p><strong>正解率:</strong> <span id="res-accuracy" class="accent-text"></span></p>
            <div id="perfect-records" class="hidden">
                <p><strong>クイズ題名:</strong> <span id="res-title">英語並べ替え練習問題 Lesson 5 Pt.1</span></p>
                <p><strong>100%になるまでやった回数:</strong> <span id="res-attempts" class="accent-text"></span> 回目</p>
                <p><strong>100%になった日時:</strong> <span id="res-datetime"></span></p>
            </div>
            <div id="next-mode-suggestion" class="next-mode-msg hidden">
                🔷 素晴らしい！次はSpeed modeで挑戦しよう！
            </div>
        </div>
        <button id="retry-btn">モード選択に戻る</button>
    </div>
</div>

<script>
    // 元データ（固定順序のマスターデータ）
    const masterQuestions = [
        {
            jp: "あなたを笑わせる科学の賞",
            en: ["a science award", "that", "makes", "you", "laugh"],
            mark: ".",
            fake: "make"
        },
        {
            jp: "私はその記事がとても面白いとわかった。",
            en: ["I", "found", "the articles", "very", "amusing"],
            mark: ".",
            fake: "thought"
        },
        {
            jp: "まず人々を笑わせ、それから考えさせる１０の偉大な業績。",
            en: ["the ten", "greatest achievements", "that", "first", "make", "people", "laugh,", "and then", "think"],
            mark: ".",
            fake: "in"
        },
        {
            jp: "ポテトチップスは，パリパリした音がより大きいと，よりおいしくなるか？",
            en: ["do", "potato chips", "taste", "better", "if they", "sound", "crunchier"],
            mark: "?",
            fake: "good"
        },
        {
            jp: "彼らは、よりよい音のするポテトチップスはよりおいしいのかどうか探り出した",
            en: ["they", "found out", "whether", "potato chips", "that", "sound better", "taste better"],
            mark: ".",
            fake: "which"
        },
        {
            jp: "彼らはボランティアの人たちに，ヘッドホンを着用しながらポテトチップスを食べるように依頼しました。",
            en: ["they", "asked", "volunteers", "to eat", "potato chips", "while", "wearing", "headphones"],
            mark: ".",
            fake: "very"
        }
    ];

    let currentQuestions = [];
    let currentIdx = 0;
    let score = 0;
    let timerInterval = null;
    let timeLeft = 30;
    let selectedMode = "";
    let userData = { classNum: "", studentNum: "", name: "" };
    let sortables = [];

    // 効果音再生用
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(type) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        if (type === 'correct') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(523.25, audioCtx.currentTime);
            osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
            osc.start(); osc.stop(audioCtx.currentTime + 0.4);
        } else {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(130, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            osc.start(); osc.stop(audioCtx.currentTime + 0.5);
        }
    }

    // 配列のシャッフル用
    function shuffle(array) {
        const arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    const loginScreen = document.getElementById('login-screen');
    const modeScreen = document.getElementById('mode-screen');
    const quizScreen = document.getElementById('quiz-screen');
    const resultScreen = document.getElementById('result-screen');
    const feedbackScreen = document.getElementById('feedback-screen');
    const feedbackText = document.getElementById('feedback-text');
    const wrongDetailsScreen = document.getElementById('wrong-details-screen');
    const userAnswerDisplay = document.getElementById('user-answer-display');
    const correctAnswerDisplay = document.getElementById('correct-answer-display');
    const nextBtnZone = document.getElementById('next-btn-zone');
    const timerZone = document.getElementById('timer-zone');

    // 入力画面の「次へ」
    document.getElementById('next-to-mode-btn').addEventListener('click', () => {
        const classNum = document.getElementById('class-num').value.trim();
        const studentNum = document.getElementById('student-num').value.trim();
        const userName = document.getElementById('user-name').value.trim();
        
        if (!classNum || !studentNum || !userName) {
            alert('クラス、番号、名前を入力してください。');
            return;
        }

        userData.classNum = classNum;
        userData.studentNum = studentNum;
        userData.name = userName;

        loginScreen.classList.add('hidden');
        modeScreen.classList.remove('hidden');
    });

    // モード画面の「戻る」
    document.getElementById('back-to-login-btn').addEventListener('click', () => {
        modeScreen.classList.add('hidden');
        loginScreen.classList.remove('hidden');
    });

    // モード選択ボタンのイベント
    const modeButtons = document.querySelectorAll('.mode-btn');
    modeButtons.forEach(button => {
        button.addEventListener('click', (e) => {
            selectedMode = e.currentTarget.getAttribute('data-mode');

            const key = `attempts_${userData.classNum}_${userData.studentNum}_${userData.name}_${selectedMode}`;
            let attempts = parseInt(localStorage.getItem(key) || "0");
            localStorage.setItem(key, attempts + 1);

            // 出題ロジックの切り分け
            if (selectedMode === "speed") {
                // Speed Modeはランダムに出題
                currentQuestions = shuffle(masterQuestions);
            } else {
                // Step-by-Step モードはマスターデータの登録順のまま固定
                currentQuestions = [...masterQuestions];
            }

            modeScreen.classList.add('hidden');
            quizScreen.classList.remove('hidden');
            
            currentIdx = 0;
            score = 0;
            loadQuestion();
        });
    });

    // 問題の読み込み
    function loadQuestion() {
        if (timerInterval) clearInterval(timerInterval);
        feedbackScreen.classList.add('hidden');
        wrongDetailsScreen.classList.add('hidden');
        nextBtnZone.classList.add('hidden');
        
        const q = currentQuestions[currentIdx];
        
        document.getElementById('display-user').textContent = `${userData.classNum} 組 ${userData.studentNum} 番 ${userData.name}`;
        document.getElementById('progress').textContent = `${currentIdx + 1} / ${currentQuestions.length}`;
        document.getElementById('hint-jp').textContent = q.jp;
        document.getElementById('fixed-mark').textContent = q.mark;

        // パーツの初期並び順はどちらのモードでもシャッフルして表示
        const allOptions = [...q.en, q.fake];
        const shuffledOptions = shuffle(allOptions);

        const trashArea = document.getElementById('list-trash');
        const answerArea = document.getElementById('list-answer');
        trashArea.innerHTML = '';
        answerArea.innerHTML = '';
        shuffledOptions.forEach(word => {
            const wordEl = document.createElement('div');
            wordEl.className = 'word-item';
            wordEl.textContent = word;
            trashArea.appendChild(wordEl);
        });

        sortables.forEach(s => s.destroy());
        const sortOptions = { group: 'words', animation: 150 };
        sortables = [
            new Sortable(answerArea, sortOptions),
            new Sortable(trashArea, sortOptions)
        ];

        if (selectedMode === "speed") {
            timerZone.classList.remove('hidden');
            timeLeft = 30;
            document.getElementById('time-left').textContent = timeLeft;
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('time-left').textContent = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    checkAnswer(true);
                }
            }, 1000);
        } else {
            timerZone.classList.add('hidden');
        }
    }

    document.getElementById('check-btn').addEventListener('click', () => {
        if (selectedMode === "speed") {
            clearInterval(timerInterval);
        }
        checkAnswer(false);
    });

    function checkAnswer(isTimeUp = false) {
        const q = currentQuestions[currentIdx];
        const currentOrder = Array.from(document.getElementById('list-answer').children).map(el => el.textContent);
        
        const correctAnswerStr = q.en.join(' ');
        const userAnswerStr = currentOrder.join(' ');
        let isCorrect = !isTimeUp && (userAnswerStr === correctAnswerStr);

        if (isCorrect) {
            score++;
            playSound('correct');
            feedbackScreen.className = "feedback correct";
            feedbackText.textContent = "Right!";
        } else {
            playSound('incorrect');
            feedbackScreen.className = "feedback incorrect";
            feedbackText.textContent = isTimeUp ? "Time Up!" : "Wrong!";
            
            userAnswerDisplay.innerHTML = '';
            if (currentOrder.length === 0) {
                userAnswerDisplay.innerHTML = '<span style="opacity:0.6;">（未入力）</span>';
            } else {
                currentOrder.forEach((word, index) => {
                    const span = document.createElement('span');
                    span.className = 'diff-text';
                    span.textContent = word + ' ';
                    
                    if (word !== q.en[index]) {
                        span.classList.add('wrong-part');
                    }
                    userAnswerDisplay.appendChild(span);
                });
                if (q.mark) {
                    const markSpan = document.createElement('span');
                    markSpan.textContent = q.mark;
                    userAnswerDisplay.appendChild(markSpan);
                }
            }

            let fullCorrect = q.en.join(' ');
            if (q.mark !== "," && q.mark !== "." && q.mark !== "?" && q.mark !== "") {
                fullCorrect += " " + q.mark;
            } else {
                fullCorrect += q.mark;
            }
            correctAnswerDisplay.textContent = fullCorrect;
            wrongDetailsScreen.classList.remove('hidden');
        }
        
        feedbackScreen.classList.remove('hidden');

        if (selectedMode === "speed") {
            let waitTime = isCorrect ? 1000 : 3000;
            setTimeout(() => {
                goNext();
            }, waitTime);
        } else {
            nextBtnZone.classList.remove('hidden');
        }
    }

    document.getElementById('next-question-btn').addEventListener('click', (e) => {
        e.stopPropagation();
        goNext();
    });

    function goNext() {
        currentIdx++;
        if (currentIdx < currentQuestions.length) {
            loadQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        feedbackScreen.classList.add('hidden');
        quizScreen.classList.add('hidden');
        resultScreen.classList.remove('hidden');

        document.getElementById('res-mode').textContent = selectedMode === "speed" ? "Speed Mode" : "Step-by-Step";

        const accuracy = Math.round((score / currentQuestions.length) * 100);
        document.getElementById('res-user').textContent = `${userData.classNum} 組 ${userData.studentNum} 番 ${userData.name}`;
        document.getElementById('res-accuracy').textContent = `${accuracy}%`;
        const perfectRecords = document.getElementById('perfect-records');
        const suggestionZone = document.getElementById('next-mode-suggestion');
        
        if (accuracy === 100) {
            document.getElementById('result-status-title').textContent = "🎉 100% 達成おめでとうございます！ 🎉";
            perfectRecords.classList.remove('hidden');
            
            const key = `attempts_${userData.classNum}_${userData.studentNum}_${userData.name}_${selectedMode}`;
            const attempts = localStorage.getItem(key) || "1";
            const now = new Date();
            const datetimeStr = `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;

            document.getElementById('res-attempts').textContent = attempts;
            document.getElementById('res-datetime').textContent = datetimeStr;

            if (selectedMode === "step") {
                suggestionZone.classList.remove('hidden');
            } else {
                suggestionZone.classList.add('hidden');
            }
        } else {
            document.getElementById('result-status-title').textContent = "結果発表";
            perfectRecords.classList.add('hidden');
            suggestionZone.classList.add('hidden');
        }
    }

    document.getElementById('retry-btn').addEventListener('click', () => {
        resultScreen.classList.add('hidden');
        loginScreen.classList.remove('hidden');
    });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>単語練習アプリ</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 600px; /* 2x2が綺麗に収まるよう少し幅を広げました */
            position: relative;
        }
        h1 { color: #333; margin-top: 0; }
        .screen { display: none; }
        .active { display: block; }
        
        /* タイマー表示 */
        .timer-bar {
            width: 100%; height: 6px; background-color: #e0e0e0;
            border-radius: 3px; margin-top: 10px; overflow: hidden;
        }
        .timer-progress {
            width: 100%; height: 100%; background-color: #ea4335;
            transition: width 0.1s linear;
        }
        .timer-text { font-size: 14px; color: #666; margin-top: 4px; }

        /* 共通フォーム */
        input[type="text"], input[type="number"] {
            width: 80%; padding: 10px; margin: 10px 0;
            border: 1px solid #ccc; border-radius: 6px; font-size: 16px;
        }
        .primary-btn {
            background-color: #1a73e8; color: white; border: none;
            padding: 12px 30px; font-size: 16px; border-radius: 6px;
            cursor: pointer; transition: background 0.2s; margin-top: 15px;
        }
        .primary-btn:hover { background-color: #1557b0; }
        
        /* クイズエリア */
        .word-area {
            display: flex; justify-content: center; align-items: center; gap: 15px; margin: 25px 0;
        }
        .word { font-size: 42px; font-weight: bold; color: #1a73e8; }
        
        /* 音声再生用スピーカーボタン */
        .audio-btn {
            background: none; border: none; font-size: 28px; cursor: pointer; padding: 5px;
            border-radius: 50%; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
            transition: background 0.2s;
        }
        .audio-btn:hover { background-color: #f1f3f4; }

        /* ★【変更】選択肢を2×2列にするグリッドレイアウト */
        .choices {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-top: 20px;
        }
        .choice-btn {
            background-color: #ffffff; border: 2px solid #dadce0; border-radius: 12px;
            padding: 25px 15px; font-size: 18px; font-weight: bold; cursor: pointer; 
            transition: all 0.2s; text-align: center; min-height: 80px;
            display: flex; align-items: center; justify-content: center;
        }
        .choice-btn:hover:not(:disabled) { background-color: #f8f9fa; border-color: #1a73e8; }
        
        /* 正解・不正解の装飾 */
        .choice-btn.correct-choice { background-color: #e6f4ea; border-color: #34a853; color: #137333; }
        .choice-btn.wrong-choice { background-color: #fce8e6; border-color: #ea4335; color: #c5221f; }

        .result-msg { font-size: 36px; font-weight: bold; margin: 20px 0; min-height: 48px; }
        .right { color: #34a853; }
        .wrong { color: #ea4335; }
        
        /* 結果エリア */
        .score-display { font-size: 48px; font-weight: bold; color: #333; margin: 20px 0; }
        .perfect-record {
            background-color: #e6f4ea; border: 2px solid #34a853; color: #137333;
            padding: 20px; border-radius: 8px; text-align: left; margin-top: 20px;
        }
        .perfect-title { font-size: 32px; font-weight: bold; text-align: center; margin-bottom: 15px; color: #1b5e20; }
    </style>
</head>
<body>

<div class="container">
    <div id="screen-login" class="screen active">
        <h1>📝 単語テスト</h1>
        <p>クラス、番号、名前を入力して始めてください</p>
        <input type="text" id="user-class" placeholder="例: 1年A組"><br>
        <input type="number" id="user-number" placeholder="例: 15"><br>
        <input type="text" id="user-name" placeholder="例: 山田太郎"><br>
        <button class="primary-btn" onclick="submitProfile()">スタート！</button>
    </div>

    <div id="screen-quiz" class="screen">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div id="quiz-timer-container" style="width: 60px;">
                <div class="timer-bar"><div id="timer-progress" class="timer-progress"></div></div>
                <div class="timer-text"><span id="timer-sec">5.0</span>秒</div>
            </div>
            <div id="quiz-progress" style="color: #666;"></div>
        </div>
        <div class="word-area">
            <div class="word" id="question-word">English</div>
            <button class="audio-btn" onclick="speakCurrentWord()" title="もう一度聴く">🔊</button>
        </div>
        <div class="choices" id="choices-container"></div>
        <div class="result-msg" id="result-message"></div>
    </div>

    <div id="screen-result" class="screen">
        <h1>🏁 テスト終了</h1>
        <div class="score-display" id="score-text">0%</div>
        
        <div id="perfect-area" style="display: none;">
            <div class="perfect-title">🎉 100% 🎉</div>
            <div class="perfect-record">
                <p><strong>やった回数:</strong> <span id="record-count"></span> 回目</p>
                <p><strong>達成時間:</strong> <span id="record-time"></span></p>
                <p><strong>クラス:</strong> <span id="record-class"></span></p>
                <p><strong>番号:</strong> <span id="record-number"></span>番</p>
                <p><strong>名前:</strong> <span id="record-name"></span></p>
            </div>
        </div>
        
        <button class="primary-btn" onclick="restartQuiz()">もう一度挑戦する</button>
    </div>
</div>

<script>
    // ↓↓↓ 【先生用】ここにエクセルのA列（英語）とB列（日本語）のデータをカンマ区切りで貼り付けてください ↓↓↓
    const defaultCSVData = `
effort	,努力
without,～のない
result	,結果
meaningless,意味がない
assenbly,集会
disagree,反対する
say to myself,心の中で思う
process,過程
reaction,反応
comment,見解
opinion,意見
still,未だに
northern lights,オーロラ
over,～の上
peak,頂上
such a,そのような～
tribute,尊敬のしるし
bear,熊
attack,攻撃
take,(時間)がかかる
trip,旅行
to the foot of,～のふもと
spend,過ごす
the same,同じ
capture,捉える
both,両方
provide,与える
weak,弱い
enough,十分な
light up,照らす
finally	,ついに
manage to,なんとかしてやる
`; // ↑↑↑ データの最後の行までここに挟んでください ↑↑↑

    let userProfile = { class: '', number: '', name: '' };
    let originalList = [];
    let quizQueue = [];
    let allJapaneseAnswers = [];
    
    let currentWordIndex = 0;
    let correctCount = 0;
    let attemptCount = 0;

    let timeLimit = 5000;
    let timeLeft = 5000;
    let timerInterval = null;
    let autoNextTimeout = null;
    let isAnswered = false;

    window.onload = function() {
        parseEmbeddedData(defaultCSVData);
    };

    function parseEmbeddedData(text) {
        const lines = text.split(/\r?\n/);
        originalList = [];
        allJapaneseAnswers = [];

        lines.forEach(line => {
            const parts = line.split(',');
            if (parts.length >= 2 && parts[0].trim() !== "" && parts[1].trim() !== "") {
                const item = { en: parts[0].trim(), ja: parts[1].trim() };
                originalList.push(item);
                allJapaneseAnswers.push(parts[1].trim());
            }
        });
    }

    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    function submitProfile() {
        const uClass = document.getElementById('user-class').value.trim();
        const uNumber = document.getElementById('user-number').value.trim();
        const uName = document.getElementById('user-name').value.trim();

        if (!uClass || !uNumber || !uName) {
            alert("すべての項目を入力してください！");
            return;
        }

        if (originalList.length < 4) {
            alert("システムエラー: 埋め込まれた単語が4つ未満です。先生に確認してください。");
            return;
        }

        userProfile = { class: uClass, number: uNumber, name: uName };
        startQuizSession();
    }

    function startQuizSession() {
        attemptCount++;
        correctCount = 0;
        currentWordIndex = 0;
        quizQueue = [...originalList].sort(() => Math.random() - 0.5);

        showScreen('screen-quiz');
        nextQuestion();
    }

    function nextQuestion() {
        if (currentWordIndex >= quizQueue.length) {
            showResult();
            return;
        }

        document.getElementById('result-message').innerText = '';
        document.getElementById('result-message').className = 'result-msg';
        document.getElementById('quiz-progress').innerText = `${currentWordIndex + 1} / ${quizQueue.length}`;
        isAnswered = false;

        const currentWord = quizQueue[currentWordIndex];
        document.getElementById('question-word').innerText = currentWord.en;

        // ★ 音声自動読み上げの実行
        speakCurrentWord();

        // 4択の選択肢作成
        let choices = [currentWord.ja];
        while (choices.length < 4) {
            const randomJa = allJapaneseAnswers[Math.floor(Math.random() * allJapaneseAnswers.length)];
            if (!choices.includes(randomJa)) {
                choices.push(randomJa);
            }
        }
        choices.sort(() => Math.random() - 0.5);

        const container = document.getElementById('choices-container');
        container.innerHTML = '';
        choices.forEach(choice => {
            const button = document.createElement('button');
            button.className = 'choice-btn';
            button.innerText = choice;
            button.onclick = function() { checkAnswer(choice, currentWord.ja, button); };
            container.appendChild(button);
        });

        startTimer();
    }

    // ★【新機能】音声読み上げ関数
    function speakCurrentWord() {
        // 再生中の音声を一度クリア
        window.speechSynthesis.cancel();
        
        const currentWord = quizQueue[currentWordIndex];
        if (!currentWord) return;

        const utterance = new SpeechSynthesisUtterance(currentWord.en);
        utterance.lang = 'en-US'; // アメリカ英語に設定（イギリス英語なら 'en-GB'）
        utterance.rate = 0.9;     // 少しだけ聞き取りやすくするために、標準（1.0）よりわずかに遅くしています
        
        window.speechSynthesis.speak(utterance);
    }

    function startTimer() {
        clearInterval(timerInterval);
        timeLeft = timeLimit;
        updateTimerDisplay();

        const updateInterval = 100;
        timerInterval = setInterval(() => {
            timeLeft -= updateInterval;
            if (timeLeft <= 0) {
                timeLeft = 0;
                clearInterval(timerInterval);
                timeUp();
            }
            updateTimerDisplay();
        }, updateInterval);
    }

    function updateTimerDisplay() {
        const progressPercent = (timeLeft / timeLimit) * 100;
        document.getElementById('timer-progress').style.width = `${progressPercent}%`;
        document.getElementById('timer-sec').innerText = (timeLeft / 1000).toFixed(1);
    }

    function timeUp() {
        if (isAnswered) return;
        isAnswered = true;

        clearInterval(timerInterval);
        
        const currentWord = quizQueue[currentWordIndex];
        const buttons = document.querySelectorAll('.choice-btn');
        buttons.forEach(btn => {
            btn.disabled = true;
            if (btn.innerText === currentWord.ja) {
                btn.classList.add('correct-choice');
            }
        });

        const resultDiv = document.getElementById('result-message');
        resultDiv.innerText = 'boo! (時間切れ)';
        resultDiv.className = 'result-msg wrong';

        currentWordIndex++;
        autoNextTimeout = setTimeout(nextQuestion, 1000);
    }

    function checkAnswer(selected, correct, selectedButton) {
        if (isAnswered) return;
        isAnswered = true;

        clearInterval(timerInterval);
        
        const resultDiv = document.getElementById('result-message');
        const buttons = document.querySelectorAll('.choice-btn');
        
        buttons.forEach(btn => {
            btn.disabled = true;
            if (btn.innerText === correct) {
                btn.classList.add('correct-choice');
            }
        });

        if (selected === correct) {
            resultDiv.innerText = 'right!';
            resultDiv.className = 'result-msg right';
            correctCount++;
        } else {
            selectedButton.classList.add('wrong-choice');
            resultDiv.innerText = 'boo!';
            resultDiv.className = 'result-msg wrong';
        }

        currentWordIndex++;
        autoNextTimeout = setTimeout(nextQuestion, 1000);
    }

    function showResult() {
        clearInterval(timerInterval);
        clearTimeout(autoNextTimeout);
        showScreen('screen-result');
        
        const scorePercent = Math.round((correctCount / quizQueue.length) * 100);
        document.getElementById('score-text').innerText = `${scorePercent}%`;

        const perfectArea = document.getElementById('perfect-area');
        
        if (scorePercent === 100) {
            const now = new Date();
            const timeStr = `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()} ${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;
            
            document.getElementById('record-count').innerText = attemptCount;
            document.getElementById('record-time').innerText = timeStr;
            document.getElementById('record-class').innerText = userProfile.class;
            document.getElementById('record-number').innerText = userProfile.number;
            document.getElementById('record-name').innerText = userProfile.name;
            
            perfectArea.style.display = 'block';
        } else {
            perfectArea.style.display = 'none';
        }
    }

    function restartQuiz() {
        startQuizSession();
    }
</script>

</body>
</html>
